<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>八字合婚 · 八步演算</title>
  <!-- 引入 lunar-javascript 农历库 -->
  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.6.12/lunar.min.js">
  </script>
  <style>
    /* ============================================================
    第1块：全局重置 & 基础样式
    作用：清除浏览器默认边距，设置 body 背景渐变、字体
    ============================================================ */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      /* 深空蓝紫渐变，营造深邃星空感 */
      background: linear-gradient(145deg, #0b0e1a 0%, #1a1f35 40%, #0d1b2a 100%);
      font-family: 'Segoe UI', '华文楷体', 'KaiTi', 'Microsoft YaHei', serif;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #c8d0e0;
    }
    .container {
      max-width: 1000px;
      width: 100%;
      /* 毛玻璃效果卡片 */
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      border-radius: 32px;
      padding: 28px 24px 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: 6px;
      text-align: center;
      border-bottom: 2px dashed rgba(255, 255, 255, 0.08);
      padding-bottom: 16px;
      margin-bottom: 24px;
      color: #e8edf5;
      text-shadow: 0 0 40px rgba(60, 120, 255, 0.10);
    }
    h1 small {
      font-size: 0.9rem;
      letter-spacing: 2px;
      color: #8899bb;
      display: block;
      margin-top: 6px;
      font-weight: 300;
    }
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 24px;
      background: rgba(255, 255, 255, 0.04);
      padding: 20px 18px;
      border-radius: 28px;
      margin-bottom: 28px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .input-group label {
      font-size: 0.95rem;
      font-weight: 500;
      color: #aabbdd;
      letter-spacing: 1px;
      margin-left: 6px;
    }
    .input-group input {
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.05);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: 0.2s;
      color: #e8edf5;
      min-width: 0;
      width: 100%;
    }
    .input-group input:focus {
      border-color: rgba(100, 180, 255, 0.4);
      box-shadow: 0 0 0 3px rgba(60, 120, 255, 0.15);
    }
    .input-group input::placeholder {
      color: #556688;
    }
    .input-group input[type="number"] {
      -moz-appearance: textfield;
    }
    .input-group input[type="number"]::-webkit-outer-spin-button,
    .input-group input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }
    .input-group input.error {
      border-color: rgba(255, 80, 80, 0.5);
      box-shadow: 0 0 0 3px rgba(255, 80, 80, 0.15);
    }
    .input-error {
      color: #ff6b6b;
      font-size: 0.78rem;
      margin-left: 10px;
      margin-top: 2px;
      min-height: 18px;
    }
    /* 姓名双栏布局 - 标签在输入框前面 */
    .name-row {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .name-row .name-label {
      font-size: 0.85rem;
      color: #8899bb;
      white-space: nowrap;
      font-weight: 500;
      letter-spacing: 0.5px;
      min-width: 20px;
    }
    .name-row .name-input-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
      min-width: 60px;
    }
    .name-row .name-input-wrap input {
      flex: 1;
      min-width: 40px;
      padding: 8px 10px;
    }
    .name-row .name-input-wrap .label-inline {
      font-size: 0.75rem;
      color: #556688;
      background: rgba(255, 255, 255, 0.05);
      padding: 2px 8px;
      border-radius: 12px;
      white-space: nowrap;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .gender-group {
      display: flex;
      gap: 18px;
      align-items: center;
      margin-top: 4px;
      padding-left: 6px;
      flex-wrap: wrap;
    }
    .gender-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 400;
      font-size: 0.95rem;
      cursor: pointer;
      color: #aabbdd;
    }
    .gender-group input[type="radio"] {
      width: 18px;
      height: 18px;
      accent-color: #4A90E2;
    }
    .calendar-toggle {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 6px;
      margin-left: 6px;
      flex-wrap: wrap;
    }
    .calendar-toggle label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 400;
      font-size: 0.9rem;
      cursor: pointer;
      color: #aabbdd;
    }
    .calendar-toggle input[type="radio"] {
      width: 16px;
      height: 16px;
      accent-color: #4A90E2;
    }
    .date-row {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      align-items: center;
    }
    .date-row input {
      flex: 1 1 0;
      min-width: 42px;
      padding: 8px 6px;
      font-size: 0.92rem;
    }
    .date-row .hour-label {
      font-size: 0.85rem;
      color: #8899bb;
      background: rgba(255, 255, 255, 0.06);
      padding: 4px 10px;
      border-radius: 30px;
      white-space: nowrap;
      margin-left: 2px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .action-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      margin: 24px 0 20px;
    }
    .btn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.10);
      padding: 12px 36px;
      border-radius: 60px;
      font-size: 1.15rem;
      font-weight: 500;
      color: #c8d0e0;
      letter-spacing: 2px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.2);
      font-family: inherit;
      flex: 1 1 0;
      min-width: 180px;
      max-width: 260px;
      white-space: nowrap;
    }
    .btn-primary {
      background: rgba(60, 120, 255, 0.20);
      color: #8ab4ff;
      box-shadow: 0 4px 0 rgba(30, 80, 200, 0.3);
      border-color: rgba(60, 120, 255, 0.25);
    }
    .btn-primary:hover {
      background: rgba(60, 120, 255, 0.30);
      transform: translateY(-2px);
      box-shadow: 0 6px 0 rgba(30, 80, 200, 0.4);
      border-color: rgba(60, 120, 255, 0.4);
    }
    .btn-primary:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 rgba(30, 80, 200, 0.3);
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.2);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }
    .steps-container {
      margin: 28px 0 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 28px;
      padding: 8px 8px 8px 8px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .step-item {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 40px;
      padding: 16px 20px;
      margin-bottom: 10px;
      border-left: 6px solid rgba(60, 120, 255, 0.3);
      transition: 0.15s;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
    }
    .step-item:last-child {
      margin-bottom: 0;
    }
    .step-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .step-num {
      background: rgba(60, 120, 255, 0.25);
      color: #8ab4ff;
      border-radius: 40px;
      padding: 0 16px;
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 28px;
      letter-spacing: 1px;
    }
    .step-title {
      font-weight: 600;
      font-size: 1.2rem;
      color: #e8edf5;
    }
    .step-badge {
      font-size: 0.75rem;
      background: rgba(255, 255, 255, 0.06);
      padding: 2px 14px;
      border-radius: 30px;
      color: #8899bb;
      margin-left: 4px;
    }
    .step-content {
      margin-top: 10px;
      font-size: 0.98rem;
      line-height: 1.8;
      color: #c8d0e0;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 24px;
      padding: 12px 18px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }
    .step-content .label {
      font-weight: 600;
      color: #8ab4ff;
    }
    .step-content .value {
      color: #c8d0e0;
    }
    .result-summary {
      margin-top: 24px;
      padding: 18px 22px;
      background: rgba(60, 120, 255, 0.10);
      border-radius: 60px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: 500;
      letter-spacing: 2px;
      border: 1px solid rgba(60, 120, 255, 0.15);
      color: #8ab4ff;
    }
    /* ---- 多功能合婚栏 (仅保留嫁娶择日) ---- */
    .extra-marriage-section {
      margin-top: 20px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 28px;
      padding: 16px 18px 18px 18px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .extra-marriage-section .extra-title {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 500;
      color: #8ab4ff;
      letter-spacing: 3px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .extra-marriage-section .extra-panel {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 24px;
      padding: 2px 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.98rem;
      line-height: 1.8;
      color: #c8d0e0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      min-height: auto;
      max-height: 600px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(60, 120, 255, 0.3) transparent;
    }
    
    /* Chrome/Safari/Edge 滚动条样式 */
    .extra-marriage-section .extra-panel::-webkit-scrollbar {
      width: 6px;
    }
    .extra-marriage-section .extra-panel::-webkit-scrollbar-track {
      background: transparent;
      border-radius: 24px;
      margin: 4px 0;
    }
    .extra-marriage-section .extra-panel::-webkit-scrollbar-thumb {
      background: rgba(60, 120, 255, 0.3);
      border-radius: 12px;
      transition: background 0.2s;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    .extra-marriage-section .extra-panel::-webkit-scrollbar-thumb:hover {
      background: rgba(60, 120, 255, 0.5);
    }
    .extra-marriage-section .extra-panel::-webkit-scrollbar-button {
      display: none;
    }
    .extra-marriage-section .extra-panel .label {
      font-weight: 600;  
      color: #8ab4ff;
    }
    /* 月份折叠样式 */
    .month-collapse {
      margin-bottom: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      overflow: hidden;
    }
    .month-collapse-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.04);
      cursor: pointer;
      transition: 0.2s;
      user-select: none;
      border-radius: 12px;
    }
    .month-collapse-header:hover {
      background: rgba(255, 255, 255, 0.08);
    }
    .month-collapse-header .month-name {
      font-weight: 600;
      font-size: 1rem;
      color: #e8edf5;
    }
    .month-collapse-header .month-badge {
      font-size: 0.75rem;
      color: #8899bb;
      background: rgba(255, 255, 255, 0.06);
      padding: 2px 12px;
      border-radius: 20px;
    }
    .month-collapse-header .collapse-arrow {
      font-size: 0.8rem;
      color: #8899bb;
      transition: transform 0.25s ease;
    }
    .month-collapse-header .collapse-arrow.open {
      transform: rotate(180deg);
    }
    .month-collapse-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
      padding: 0 6px;
    }
    .month-collapse-body.open {
      max-height: 3000px;
      padding: 10px 6px;
    }
    .month-collapse-body .day-item {
      padding: 3px 6px;
      font-size: 0.9rem;
      line-height: 1.9;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      color: #c8d0e0;
    }
    .month-collapse-body .day-item:last-child {
      border-bottom: none;
    }
    .month-collapse-body .day-item .flag-good {
      color: #66bb6a;
    }
    .month-collapse-body .day-item .flag-bad {
      color: #ff6b6b;
    }
    .month-collapse-body .day-item .avoid-info {
      color: #8899bb;
      font-size: 0.82rem;
    }
    .month-collapse-body .day-item .score-badge {
      font-size: 0.7rem;
      background: rgba(60, 120, 255, 0.15);
      color: #8ab4ff;
      padding: 0 8px;
      border-radius: 12px;
      margin-left: 4px;
    }
    .wedding-summary-line {
      margin-bottom: 12px;
      font-size: 0.92rem;
      color: #aabbdd;
      text-align: center;
    }
    .footnote {
      margin-top: 20px;
      text-align: center;
      font-size: 0.8rem;
      color: #556688;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding-top: 16px;
      flex-shrink: 0;
    }
    /* 加载提示 */
    .loading-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(11, 14, 26, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
    }
    .loading-overlay.active {
      display: flex;
    }
    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(60, 120, 255, 0.15);
      border-top-color: #8ab4ff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      color: #8ab4ff;
      font-size: 1.1rem;
      letter-spacing: 3px;
    }

    /* 响应式 */
    @media (max-width: 820px) {
      .input-grid {
        grid-template-columns: 1fr 1fr;
        gap: 12px 16px;
        padding: 16px 14px;
      }
      .container {
        padding: 20px 16px;
      }
      .date-row input {
        min-width: 36px;
        font-size: 0.85rem;
        padding: 6px 4px;
      }
      .date-row .hour-label {
        font-size: 0.78rem;
        padding: 3px 8px;
      }
      .btn {
        min-width: 140px;
        max-width: 100%;
        flex: 1 1 100%;
        white-space: normal;
        padding: 10px 20px;
        font-size: 1rem;
      }
      .name-row .name-input-wrap input {
        padding: 6px 8px;
        font-size: 0.9rem;
      }
      .name-row .name-label {
        font-size: 0.78rem;
      }
    }
    @media (max-width: 640px) {
      .input-grid {
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 14px 12px;
      }
      .container {
        padding: 16px 12px;
      }
      .step-item {
        padding: 14px 14px;
      }
      .name-row {
        flex-wrap: wrap;
        gap: 4px;
      }
      .name-row .name-input-wrap {
        min-width: 50px;
        flex: 1 1 40%;
      }
      .name-row .name-input-wrap input {
        min-width: 30px;
        font-size: 0.85rem;
        padding: 6px 6px;
      }
      .date-row input {
        min-width: 32px;
        font-size: 0.8rem;
        padding: 5px 3px;
      }
      .date-row .hour-label {
        font-size: 0.72rem;
        padding: 2px 6px;
      }
      .calendar-toggle {
        gap: 8px;
      }
      .calendar-toggle label {
        font-size: 0.8rem;
      }
      .gender-group {
        gap: 12px;
      }
      .gender-group label {
        font-size: 0.85rem;
      }
      .month-collapse-header {
        padding: 6px 10px;
      }
      .month-collapse-header .month-name {
        font-size: 0.9rem;
      }
      .month-collapse-body .day-item {
        font-size: 0.82rem;
        padding: 2px 4px;
      }
    }
  </style>
</head>
<body>
  <!-- 加载遮罩 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">🔮 天机演算中 ...</div>
  </div>

  <div class="container" id="app">
    <h1>⚛️ 八字合婚 <small>八步演算 · 天作之合</small></h1>

    <!-- 输入区 -->
    <div class="input-grid">
      <!-- 男方姓名 -->
      <div class="input-group">
        <label>👤 男方姓名</label>
        <div class="name-row">
          <span class="name-label">姓</span>
          <div class="name-input-wrap">
            <input type="text" id="maleSurname" value="王" placeholder="姓" maxlength="2">
          </div>
          <span class="name-label">名</span>
          <div class="name-input-wrap">
            <input type="text" id="maleGivenName" value="林" placeholder="名" maxlength="4">
          </div>
        </div>
        <div class="input-error" id="maleNameError"></div>
      </div>

      <!-- 女方姓名 -->
      <div class="input-group">
        <label>👩 女方姓名</label>
        <div class="name-row">
          <span class="name-label">姓</span>
          <div class="name-input-wrap">
            <input type="text" id="femaleSurname" value="李" placeholder="姓" maxlength="2">
          </div>
          <span class="name-label">名</span>
          <div class="name-input-wrap">
            <input type="text" id="femaleGivenName" value="慕婉" placeholder="名" maxlength="4">
          </div>
        </div>
        <div class="input-error" id="femaleNameError"></div>
      </div>

      <!-- 男方出生 -->
      <div class="input-group">
        <label>📅 男方出生</label>
        <div class="calendar-toggle">
          <label><input type="radio" name="maleCal" value="solar" checked> 公历</label>
          <label><input type="radio" name="maleCal" value="lunar"> 农历</label>
        </div>
        <div class="date-row">
          <input type="number" id="maleYear" value="1990" placeholder="年" style="flex:2;" min="1900" max="2100" maxlength="4" oninput="if(this.value.length>4) this.value=this.value.slice(0,4)">
          <input type="number" id="maleMonth" value="5" placeholder="月" style="flex:1;" min="1" max="12" maxlength="2" oninput="if(this.value.length>2) this.value=this.value.slice(0,2)">
          <input type="number" id="maleDay" value="12" placeholder="日" style="flex:1;" min="1" max="31" maxlength="2" oninput="if(this.value.length>2) this.value=this.value.slice(0,2)">
          <input type="number" id="maleHour" value="8" placeholder="时" style="flex:1;" min="0" max="23" maxlength="2" oninput="if(this.value.length>2) this.value=this.value.slice(0,2)">
          <span class="hour-label" id="maleHourLabel">辰时</span>
        </div>
        <div class="input-error" id="maleDateError"></div>
      </div>

      <!-- 女方出生 -->
      <div class="input-group">
        <label>📅 女方出生</label>
        <div class="calendar-toggle">
          <label><input type="radio" name="femaleCal" value="solar" checked> 公历</label>
          <label><input type="radio" name="femaleCal" value="lunar"> 农历</label>
        </div>
        <div class="date-row">
          <input type="number" id="femaleYear" value="1992" placeholder="年" style="flex:2;" min="1900" max="2100" maxlength="4" oninput="if(this.value.length>4) this.value=this.value.slice(0,4)">
          <input type="number" id="femaleMonth" value="8" placeholder="月" style="flex:1;" min="1" max="12" maxlength="2" oninput="if(this.value.length>2) this.value=this.value.slice(0,2)">
          <input type="number" id="femaleDay" value="20" placeholder="日" style="flex:1;" min="1" max="31" maxlength="2" oninput="if(this.value.length>2) this.value=this.value.slice(0,2)">

      function isValidDate(year, month, day) {

        return date.getFullYear() === year && date.getMonth() === month - 1 && date.getDate() === day;
      }

      function getMonthDays(year, month) {

        if (month === 4 || month === 6 || month === 9 || month === 11) return 30;
        return 31;

      function addDaysToUTC(year, month, day, days) {

        var newTime = utcTime + days * 86400000;
        var date = new Date(newTime);
        return {

        var cacheKey = lunarYear + '-' + lunarMonth + '-' + lunarDay;

        try {

          if (lunarMonth === 12) {

          var maxDay = 30;
          if (targetMonth === 2) maxDay = 28;

            day: targetDay

          for (var key in jieMap) {
            if (jq[key]) {
              var dateStr = jq[key];
              if (typeof dateStr === 'string') {
                var match = dateStr.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
                if (match) {
                  var m = parseInt(match[2]);
                  var d = parseInt(match[3]);

          _cacheKeys.push(cacheKey);

        var result = {};

        try {
          var solar = Solar.fromYmd(year, 2, 1);
          var lunar = solar.getLunar();
          var jq = lunar.getJieQiTable() || {};
          if (jq['立春']) {
            var dateStr = jq['立春'];
            var match = dateStr.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
            if (match) {
              return parseInt(match[3]);
            }
          }
        } catch (e) {
          // 忽略错误
        }
        return 4; // 默认值
      }

      // ================================================================
      // 第6块：八字排盘核心函数
      // ================================================================

      /**
       * 获取年柱干支
       * @param {number} solarYear - 公历年份
       * @param {number} solarMonth - 公历月份 (1-12)
       * @param {number} solarDay - 公历日 (1-31)
       * @returns {Object} { gan, zhi, year }
       */
      function getYearGanZhi(solarYear, solarMonth, solarDay) {
        var year = solarYear;
        var liChunDay = getLiChunDay(solarYear);
        // 立春前属于上一年
        if (solarMonth < 2 || (solarMonth === 2 && solarDay < liChunDay)) {
          year = solarYear - 1;
        }
        var gan = TIAN_GAN[(year - 4) % 10];
        var zhi = DI_ZHI[(year - 4) % 12];
        return { gan: gan, zhi: zhi, year: year };
      }

      /**
       * 获取月柱干支
       * @param {number} solarYear - 公历年份
       * @param {number} solarMonth - 公历月份 (1-12)
       * @param {number} solarDay - 公历日 (1-31)
       * @param {string} yearGan - 年干
       * @returns {Object} { gan, zhi }
       */
      function getMonthGanZhi(solarYear, solarMonth, solarDay, yearGan) {
        // 获取各节气日期
        var liChun = getJieQiDate(solarYear, 2);
        var jingZhe = getJieQiDate(solarYear, 3);
        var qingMing = getJieQiDate(solarYear, 4);
        var liXia = getJieQiDate(solarYear, 5);
        var mangZhong = getJieQiDate(solarYear, 6);
        var xiaoShu = getJieQiDate(solarYear, 7);
        var liQiu = getJieQiDate(solarYear, 8);
        var baiLu = getJieQiDate(solarYear, 9);
        var hanLu = getJieQiDate(solarYear, 10);
        var liDong = getJieQiDate(solarYear, 11);
        var daXue = getJieQiDate(solarYear, 12);
        var xiaoHan = getJieQiDate(solarYear, 1);

        var liChunDay = liChun ? liChun.day : 4;
        var jingZheDay = jingZhe ? jingZhe.day : 6;
        var qingMingDay = qingMing ? qingMing.day : 5;
        var liXiaDay = liXia ? liXia.day : 6;
        var mangZhongDay = mangZhong ? mangZhong.day : 6;
        var xiaoShuDay = xiaoShu ? xiaoShu.day : 7;
        var liQiuDay = liQiu ? liQiu.day : 7;
        var baiLuDay = baiLu ? baiLu.day : 8;
        var hanLuDay = hanLu ? hanLu.day : 8;
        var liDongDay = liDong ? liDong.day : 7;
        var daXueDay = daXue ? daXue.day : 7;
        var xiaoHanDay = xiaoHan ? xiaoHan.day : 6;

        var jieQi = [
          { month: 2, day: liChunDay, zhi: '寅' },
          { month: 3, day: jingZheDay, zhi: '卯' },
          { month: 4, day: qingMingDay, zhi: '辰' },
          { month: 5, day: liXiaDay, zhi: '巳' },
          { month: 6, day: mangZhongDay, zhi: '午' },
          { month: 7, day: xiaoShuDay, zhi: '未' },
          { month: 8, day: liQiuDay, zhi: '申' },
          { month: 9, day: baiLuDay, zhi: '酉' },
          { month: 10, day: hanLuDay, zhi: '戌' },
          { month: 11, day: liDongDay, zhi: '亥' },
          { month: 12, day: daXueDay, zhi: '子' },
          { month: 1, day: xiaoHanDay, zhi: '丑' }
        ];

        var zhi = '寅';

        // 1月特殊处理：小寒之前是子月（大雪），小寒之后是丑月
        if (solarMonth === 1) {
          zhi = (solarDay >= xiaoHanDay) ? '丑' : '子';
        } else {
          // 其他月份：从后往前找第一个满足条件的节气
          for (var i = jieQi.length - 1; i >= 0; i--) {
            var jq = jieQi[i];
            var m = jq.month;
            var d = jq.day;
            // 跳过1月（已在上面的if中处理）
            if (m === 1) continue;
            if (solarMonth > m || (solarMonth === m && solarDay >= d)) {
              zhi = jq.zhi;
              break;
            }
          }
        }

        // 根据年干推算月干
        var yearGanIndex = TIAN_GAN.indexOf(yearGan);
        var startIndex = (yearGanIndex * 2 + 2) % 10;
        var zhiIndex = DI_ZHI.indexOf(zhi);
        var monthZhiOffset = (zhiIndex - 2 + 12) % 12;
        var ganIndex = (startIndex + monthZhiOffset) % 10;
        var gan = TIAN_GAN[ganIndex];

        return { gan: gan, zhi: zhi };
      }

      /**
       * 获取日柱干支
       * @param {number} solarYear - 公历年份
       * @param {number} solarMonth - 公历月份 (1-12)
       * @param {number} solarDay - 公历日 (1-31)
       * @returns {Array} [天干, 地支]
       */
      function getDayGanZhi(solarYear, solarMonth, solarDay) {
        try {
          var solar = Solar.fromYmd(solarYear, solarMonth, solarDay);
          var lunar = solar.getLunar();
          var dayGanZhi = lunar.getDayInGanZhi();
          if (dayGanZhi && dayGanZhi.length === 2) {
            return [dayGanZhi[0], dayGanZhi[1]];
          }
        } catch (e) {
          console.warn('日柱获取失败，使用降级算法:', e);
        }

        // 降级算法：基于1900-01-01（甲子日）的偏移计算
        // ✅ 已验证：1900-01-01 确实为甲子日
        var baseUTC = Date.UTC(1900, 0, 1);
        var targetUTC = Date.UTC(solarYear, solarMonth - 1, solarDay);
        var diffDays = Math.floor((targetUTC - baseUTC) / 86400000);
        var baseGanIndex = 0; // 甲
        var baseZhiIndex = 0; // 子
        var ganIndex = ((baseGanIndex + diffDays) % 10 + 10) % 10;
        var zhiIndex = ((baseZhiIndex + diffDays) % 12 + 12) % 12;
        return [TIAN_GAN[ganIndex], DI_ZHI[zhiIndex]];
      }

      /**
       * 获取时柱干支
       * @param {string} dayGan - 日干
       * @param {number} hour - 小时 (0-23)
       * @returns {Object} { gan, zhi }
       */
      function getHourGanZhi(dayGan, hour) {
        var dayGanIndex = TIAN_GAN.indexOf(dayGan);
        var startHourGanIndex = (dayGanIndex % 5) * 2;
        var hourZhiIndex = Math.floor((hour + 1) / 2) % 12;
        var ganIndex = (startHourGanIndex + hourZhiIndex) % 10;
        return { gan: TIAN_GAN[ganIndex], zhi: DI_ZHI[hourZhiIndex] };
      }

      /**
       * 完整八字排盘
       * @param {number} year - 出生年份
       * @param {number} month - 出生月份 (1-12)
       * @param {number} day - 出生日 (1-31)
       * @param {number} hour - 出生小时 (0-23)
       * @param {string} gender - 'male' 或 'female'
       * @param {boolean} isLunar - 是否为农历
       * @returns {Object} 八字对象
       */
      function getBazi(year, month, day, hour, gender, isLunar) {
        var solarYear = year,
          solarMonth = month,
          solarDay = day;
        if (isLunar) {
          var solar = lunarToSolar(year, month, day);
          if (solar) {
            solarYear = solar.year;
            solarMonth = solar.month;
            solarDay = solar.day;
          } else {
            // 降级方案
            solarYear = year;
            solarMonth = Math.min(month + 1, 12);
            solarDay = Math.min(day + 1, 28);
          }
        }

        var yearResult = getYearGanZhi(solarYear, solarMonth, solarDay);
        var yearGan = yearResult.gan;
        var yearZhi = yearResult.zhi;

        var monthResult = getMonthGanZhi(solarYear, solarMonth, solarDay, yearGan);
        var dayResult = getDayGanZhi(solarYear, solarMonth, solarDay);
        var dayGan = dayResult[0];
        var dayZhi = dayResult[1];

        var hourResult = getHourGanZhi(dayGan, hour);

        return {
          year: [yearGan, yearZhi],
          month: [monthResult.gan, monthResult.zhi],
          day: [dayGan, dayZhi],
          hour: [hourResult.gan, hourResult.zhi],
          solarDate: { year: solarYear, month: solarMonth, day: solarDay },
          gender: gender,
          raw: { year: year, month: month, day: day, hour: hour, isLunar: isLunar }
        };
      }

      // ================================================================
      // 第7块：大运排盘
      // ================================================================

      /**
       * 获取大运
       * @param {string} yearGan - 年干
       * @param {string} monthGan - 月干
       * @param {string} monthZhi - 月支
       * @param {string} gender - 'male' 或 'female'
       * @param {number} birthYear - 出生年
       * @param {number} birthMonth - 出生月 (1-12)
       * @param {number} birthDay - 出生日 (1-31)
       * @returns {Object} { startAge: number, list: Array }
       */
      function getDaYun(yearGan, monthGan, monthZhi, gender, birthYear, birthMonth, birthDay) {
        // 阳年：年干为甲丙戊庚壬（索引为偶数）
        var isYang = (TIAN_GAN.indexOf(yearGan) % 2 === 0);

        // 大运顺逆：
        // 男命：阳年顺排(1)，阴年逆排(-1)
        // 女命：阳年逆排(-1)，阴年顺排(1)
        var maleOrder;
        if (gender === 'male') {
          maleOrder = isYang ? 1 : -1;
        } else {
          maleOrder = isYang ? -1 : 1;
        }

        var startAge = 1;

        try {
          var days = 0;
          var found = false;
          var maxSearchDays = 120;

          if (maleOrder === 1) {
            // 顺排：向后找第一个节气
            for (var i = 1; i <= maxSearchDays && !found; i++) {
              var target = addDaysToUTC(birthYear, birthMonth, birthDay, i);
              var y = target.year;
              var m = target.month;
              var d = target.day;
              try {
                var solar = Solar.fromYmd(y, m, d);
                var lunar = solar.getLunar();
                var jq = lunar.getJieQiTable() || {};
                for (var k = 0; k < JIE_QI_LIST.length; k++) {
                  var key = JIE_QI_LIST[k];
                  if (jq[key]) {
                    var dateStr = jq[key];
                    var match = dateStr.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
                    if (match) {
                      var year2 = parseInt(match[1]);
                      var month2 = parseInt(match[2]);
                      var day2 = parseInt(match[3]);
                      if (year2 === y && month2 === m && day2 === d) {
                        days = i;
                        found = true;
                        break;
                      }
                    }
                  }
                }
              } catch (e) {
                // 忽略错误
              }
            }
          } else {
            // 逆排：向前找第一个节气
            for (var i2 = 1; i2 <= maxSearchDays && !found; i2++) {
              var target2 = addDaysToUTC(birthYear, birthMonth, birthDay, -i2);
              var y2 = target2.year;
              var m2 = target2.month;
              var d2 = target2.day;
              try {
                var solar2 = Solar.fromYmd(y2, m2, d2);
                var lunar2 = solar2.getLunar();
                var jq2 = lunar2.getJieQiTable() || {};
                for (var k2 = 0; k2 < JIE_QI_LIST.length; k2++) {
                  var key2 = JIE_QI_LIST[k2];
                  if (jq2[key2]) {
                    var dateStr2 = jq2[key2];
                    var match2 = dateStr2.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
                    if (match2) {
                      var year3 = parseInt(match2[1]);
                      var month3 = parseInt(match2[2]);
                      var day3 = parseInt(match2[3]);
                      if (year3 === y2 && month3 === m2 && day3 === d2) {
                        days = i2;
                        found = true;
                        break;
                      }
                    }
                  }
                }
              } catch (e) {
                // 忽略错误
              }
            }
          }

          if (days > 0) {
            startAge = Math.max(1, Math.ceil(days / 3));
          } else {
            // 降级方案
            startAge = Math.max(1, Math.floor((birthDay + birthMonth * 2) / 3) % 10 + 1);
          }
        } catch (e) {
          startAge = Math.max(1, Math.floor((birthDay + birthMonth * 3) / 3) % 10 + 1);
        }

        // 推算大运干支
        var startGanIndex = TIAN_GAN.indexOf(monthGan);
        var startZhiIndex = DI_ZHI.indexOf(monthZhi);
        if (startGanIndex === -1) startGanIndex = 0;
        if (startZhiIndex === -1) startZhiIndex = 0;

        var daYunList = [];
        for (var i3 = 0; i3 < 6; i3++) {
          var ganIdx = ((startGanIndex + i3 * maleOrder) % 10 + 10) % 10;
          var zhiIdx = ((startZhiIndex + i3 * maleOrder) % 12 + 12) % 12;
          daYunList.push(TIAN_GAN[ganIdx] + DI_ZHI[zhiIdx]);
        }

        return { startAge: startAge, list: daYunList };
      }

      // ================================================================
      // 第8块：神煞计算
      // ================================================================

      /**
       * 获取神煞信息
       * @param {string} dayGan - 日干
       * @param {string} dayZhi - 日支
       * @param {string} monthGan - 月干（未使用，保留参数）
       * @param {string} yearGan - 年干（未使用，保留参数）
       * @returns {string} 神煞描述
       */
      function getShenSha(dayGan, dayZhi, monthGan, yearGan) {
        var ty = TIAN_YI_MAP[dayGan] || [];
        var wc = WEN_CHANG_MAP[dayGan] || '';
        var hl = HONG_LUAN_MAP[dayZhi] || '';
        return '天乙贵人: ' + (ty.length ? ty.join('、') : '无') + '；文昌贵人: ' + (wc || '无') + '；红鸾: ' + (hl || '无');
      }

      /**
       * 获取配偶星信息
       * @param {string} dayGan - 日干
       * @param {string} gender - 'male' 或 'female'
       * @returns {string} 配偶星描述
       */
      function getPeiOuXing(dayGan, gender) {
        var ganWuxing = GAN_WUXING_MAP[dayGan] || '木';
        var result = '';

        if (gender === 'male') {
          // 男命：正财为妻星，偏财为妾星
          var cai = { '木': '土', '火': '金', '土': '水', '金': '木', '水': '火' };
          var zhengCai = cai[ganWuxing] || '土';
          var pianCai = zhengCai;
          result = '正财(妻星): ' + zhengCai + '；偏财(妾星): ' + pianCai;
        } else {
          // 女命：正官为夫星，七杀为偏夫
          var guan = { '木': '金', '火': '水', '土': '木', '金': '火', '水': '土' };
          var zhengGuan = guan[ganWuxing] || '金';
          var qiSha = zhengGuan;
          result = '正官(夫星): ' + zhengGuan + '；七杀(偏夫): ' + qiSha;
        }

        return result;
      }

      // ================================================================
      // 第9块：五行互补分析
      // ================================================================

      /**
       * 计算五行互补情况
       * @param {Object} maleBA - 男方八字
       * @param {Object} femaleBA - 女方八字
       * @returns {string} 五行分析结果
       */
      function getWuXingBuJi(maleBA, femaleBA) {
        var allGan = [];
        var baziList = [maleBA, femaleBA];
        var pillars = ['year', 'month', 'day', 'hour'];

        for (var b = 0; b < baziList.length; b++) {
          var bazi = baziList[b];
          for (var p = 0; p < pillars.length; p++) {
            var pillar = pillars[p];
            var gan = bazi[pillar][0];
            var zhi = bazi[pillar][1];
            allGan.push(gan);
            var cangGan = DI_ZHI_CANG_GAN[zhi] || [];
            for (var c = 0; c < cangGan.length; c++) {
              allGan.push(cangGan[c]);
            }
          }
        }

        var wuxingCount = { '木': 0, '火': 0, '土': 0, '金': 0, '水': 0 };

        for (var g = 0; g < allGan.length; g++) {
          var wx = GAN_WUXING_MAP[allGan[g]];
          if (wx && wuxingCount[wx] !== undefined) {
            wuxingCount[wx]++;
          }
        }

        var wood = wuxingCount['木'];
        var fire = wuxingCount['火'];
        var earth = wuxingCount['土'];
        var metal = wuxingCount['金'];
        var water = wuxingCount['水'];

        var allPresent = wood > 0 && fire > 0 && earth > 0 && metal > 0 && water > 0;
        var status = allPresent ? '五行俱全' : '五行偏枯';

        // 分别统计男女五行
        var maleWx = { '木': 0, '火': 0, '土': 0, '金': 0, '水': 0 };
        var femaleWx = { '木': 0, '火': 0, '土': 0, '金': 0, '水': 0 };

        for (var b2 = 0; b2 < baziList.length; b2++) {
          var bazi2 = baziList[b2];
          var target = b2 === 0 ? maleWx : femaleWx;
          for (var p2 = 0; p2 < pillars.length; p2++) {
            var pillar2 = pillars[p2];
            var gan2 = bazi2[pillar2][0];
            var zhi2 = bazi2[pillar2][1];
            var wx2 = GAN_WUXING_MAP[gan2];
            if (wx2 && target[wx2] !== undefined) target[wx2]++;
            var cangGan2 = DI_ZHI_CANG_GAN[zhi2] || [];
            for (var c2 = 0; c2 < cangGan2.length; c2++) {
              var wx3 = GAN_WUXING_MAP[cangGan2[c2]];
              if (wx3 && target[wx3] !== undefined) target[wx3]++;
            }
          }
        }

        var complementCount = 0;
        var wxList = ['木', '火', '土', '金', '水'];
        for (var w = 0; w < wxList.length; w++) {
          var wxName = wxList[w];
          if ((maleWx[wxName] === 0 && femaleWx[wxName] > 0) ||
            (femaleWx[wxName] === 0 && maleWx[wxName] > 0)) {
            complementCount++;
          }
        }

        var complementLevel = complementCount >= 3 ? '互补良好' : (complementCount >= 1 ? '有一定互补' : '互补性弱');

        return '木: ' + wood + ', 火: ' + fire + ', 土: ' + earth + ', 金: ' + metal + ', 水: ' + water + '。' +
          status + '，' + complementLevel + '。';
      }

      // ================================================================
      // 第10块：嫁娶择日（专业版）
      // ================================================================

      /**
       * 检查是否为四离日（春分、秋分、夏至、冬至前一天）
       * @param {number} year - 年份
       * @param {number} month - 月份
       * @param {number} day - 日
       * @returns {boolean}
       */
      function isSiLi(year, month, day) {
        var jieQiDates = getJieQiDates(year);
        var siLiDates = [];
        for (var i = 0; i < SI_LI_NAMES.length; i++) {
          var date = jieQiDates[SI_LI_NAMES[i]];
          if (date) {
            var prevDay = new Date(date.year, date.month - 1, date.day - 1);
            siLiDates.push({ year: prevDay.getFullYear(), month: prevDay.getMonth() + 1, day: prevDay.getDate() });
          }
        }
        for (var j = 0; j < siLiDates.length; j++) {
          if (siLiDates[j].year === year && siLiDates[j].month === month && siLiDates[j].day === day) {
            return true;
          }
        }
        return false;
      }

      /**
       * 检查是否为四绝日（立春、立夏、立秋、立冬前一天）
       * @param {number} year - 年份
       * @param {number} month - 月份
       * @param {number} day - 日
       * @returns {boolean}
       */
      function isSiJue(year, month, day) {
        var jieQiDates = getJieQiDates(year);
        var siJueDates = [];
        for (var i = 0; i < SI_JUE_NAMES.length; i++) {
          var date = jieQiDates[SI_JUE_NAMES[i]];
          if (date) {
            var prevDay = new Date(date.year, date.month - 1, date.day - 1);
            siJueDates.push({ year: prevDay.getFullYear(), month: prevDay.getMonth() + 1, day: prevDay.getDate() });
          }
        }
        for (var j = 0; j < siJueDates.length; j++) {
          if (siJueDates[j].year === year && siJueDates[j].month === month && siJueDates[j].day === day) {
            return true;
          }
        }
        return false;
      }

      /**
       * 检查是否为杨公忌日
       * @param {number} month - 月份 (1-12)
       * @param {number} day - 日
       * @returns {boolean}
       */
      function isYangGongJi(month, day) {
        // 七月有两个杨公忌日：初一和廿九
        if (month === 7 && (day === 1 || day === 29)) return true;
        return YANG_GONG_MAP[month] === day;
      }

      /**
       * 获取日支
       * @param {number} year - 年份
       * @param {number} month - 月份 (1-12)
       * @param {number} day - 日
       * @returns {string} 地支
       */
      function getDayZhiByDate(year, month, day) {
        try {
          var solar = Solar.fromYmd(year, month, day);
          var lunar = solar.getLunar();
          var dayGanZhi = lunar.getDayInGanZhi();
          if (dayGanZhi && dayGanZhi.length === 2) {
            return dayGanZhi[1];
          }
        } catch (e) {
          // 忽略错误
        }

        // 降级算法：基于1900-01-01的偏移
        var baseUTC = Date.UTC(1900, 0, 1);
        var targetUTC = Date.UTC(year, month - 1, day);
        var diffDays = Math.floor((targetUTC - baseUTC) / 86400000);
        var baseZhiIndex = 0; // 子
        var zhiIndex = ((baseZhiIndex + diffDays) % 12 + 12) % 12;
        return DI_ZHI[zhiIndex];
      }

      /**
       * 获取避忌生肖列表
       * @param {string} dayZhi - 日支
       * @param {string} maleSX - 男方生肖
       * @param {string} femaleSX - 女方生肖
       * @returns {Array} 避忌列表
       */
      function getAvoidShengXiao(dayZhi, maleSX, femaleSX) {
        var avoidList = [];

        // 1. 日支冲生肖
        var chongSX = ZHI_SHENG_XIAO_MAP[SHENG_XIAO_CHONG_MAP[maleSX]] || '';
        var chongSX2 = ZHI_SHENG_XIAO_MAP[SHENG_XIAO_CHONG_MAP[femaleSX]] || '';
        if (chongSX && ZHI_SHENG_XIAO_MAP[dayZhi] === chongSX) {
          avoidList.push({ type: '相冲', shengxiao: chongSX, desc: '日支冲生肖' });
        }
        if (chongSX2 && ZHI_SHENG_XIAO_MAP[dayZhi] === chongSX2) {
          avoidList.push({ type: '相冲', shengxiao: chongSX2, desc: '日支冲生肖' });
        }

        // 2. 三煞
        var sanShaList = SAN_SHA_MAP[dayZhi] || [];
        for (var i = 0; i < sanShaList.length; i++) {
          avoidList.push({ type: '三煞', shengxiao: sanShaList[i], desc: '犯三煞' });
        }

        // 3. 冲犯新人
        var maleChongZhi = SHENG_XIAO_CHONG_MAP[maleSX] || '';
        var femaleChongZhi = SHENG_XIAO_CHONG_MAP[femaleSX] || '';
        if (dayZhi === maleChongZhi) {
          avoidList.push({ type: '冲犯新人', shengxiao: maleSX, desc: '冲犯新郎生肖' });
        }
        if (dayZhi === femaleChongZhi) {
          avoidList.push({ type: '冲犯新人', shengxiao: femaleSX, desc: '冲犯新娘生肖' });
        }

        // 去重（保留优先级高的）
        var unique = {};
        for (var j = 0; j < avoidList.length; j++) {
          var item = avoidList[j];
          var key = item.shengxiao;
          if (!unique[key] || item.type === '冲犯新人') {
            unique[key] = item;
          }
        }

        var result = [];
        for (var key2 in unique) {
          result.push(unique[key2]);
        }

        // 排序：冲犯新人 > 相冲 > 三煞
        var priority = { '冲犯新人': 0, '相冲': 1, '三煞': 2 };
        result.sort(function(a, b) {
          return (priority[a.type] || 3) - (priority[b.type] || 3);
        });

        return result;
      }

      /**
       * 获取天赦日列表
       * @param {number} year - 年份
       * @returns {Array} 天赦日列表 [{ year, month, day }]
       */
      function getTianSheDays(year) {
        var result = [];
        var seasons = [
          { start: 2, end: 4, gan: '戊', zhi: '寅' },
          { start: 5, end: 7, gan: '甲', zhi: '午' },
          { start: 8, end: 10, gan: '戊', zhi: '申' },
          { start: 11, end: 13, gan: '甲', zhi: '子' }
        ];

        for (var s = 0; s < seasons.length; s++) {
          var season = seasons[s];
          var startMonth = season.start;
          var endMonth = season.end;
          for (var m = startMonth; m <= endMonth; m++) {
            var month = m > 12 ? m - 12 : m;
            var year2 = m > 12 ? year + 1 : year;
            var maxDay = getMonthDays(year2, month);
            for (var d = 1; d <= maxDay; d++) {
              try {
                var solar = Solar.fromYmd(year2, month, d);
                var lunar = solar.getLunar();
                var dayGanZhi = lunar.getDayInGanZhi();
                if (dayGanZhi && dayGanZhi.length === 2) {
                  if (dayGanZhi[0] === season.gan && dayGanZhi[1] === season.zhi) {
                    result.push({ year: year2, month: month, day: d });
                  }
                }
              } catch (e) {
                // 忽略错误
              }
            }
          }
        }

        return result;
      }

      /**
       * 单日评分
       * @param {number} year - 年份
       * @param {number} month - 月份 (1-12)
       * @param {number} day - 日
       * @param {string} maleSX - 男方生肖
       * @param {string} femaleSX - 女方生肖
       * @param {Object} tianSheSet - 天赦日集合
       * @returns {Object} { score, jiShenList, isChong }
       */
      function scoreDay(year, month, day, maleSX, femaleSX, tianSheSet) {
        var dayZhi = getDayZhiByDate(year, month, day);
        if (!dayZhi) return { score: 0, jiShenList: [], isChong: false };

        var score = 0;
        var jiShenList = [];

        // 检查是否为冲日
        var maleChongZhi = SHENG_XIAO_CHONG_MAP[maleSX] || '';
        var femaleChongZhi = SHENG_XIAO_CHONG_MAP[femaleSX] || '';
        var isChong = (dayZhi === maleChongZhi) || (dayZhi === femaleChongZhi);

        // 天德合日
        var tianDe = TIAN_DE_MAP[month] || '';
        try {
          var solar = Solar.fromYmd(year, month, day);
          var lunar = solar.getLunar();
          var dayGanZhi = lunar.getDayInGanZhi();
          if (dayGanZhi && dayGanZhi.length === 2) {
            if (dayGanZhi[0] === tianDe) {
              score += 2;
              jiShenList.push('天德合日');
            }
          }
        } catch (e) {
          // 忽略错误
        }

        // 月德合日
        var yueDe = YUE_DE_MAP[month] || '';
        try {
          var solar2 = Solar.fromYmd(year, month, day);
          var lunar2 = solar2.getLunar();
          var dayGanZhi2 = lunar2.getDayInGanZhi();
          if (dayGanZhi2 && dayGanZhi2.length === 2) {
            if (dayGanZhi2[0] === yueDe) {
              score += 2;
              jiShenList.push('月德合日');
            }
          }
        } catch (e) {
          // 忽略错误
        }

        // 天赦日
        var key = year + '-' + month + '-' + day;
        if (tianSheSet[key]) {
          score += 3;
          jiShenList.push('天赦日');
        }

        // 三合
        var daySX = getShengXiaoByZhi(dayZhi);
        if (daySX) {
          for (var sg = 0; sg < SAN_HE_GROUPS.length; sg++) {
            var group = SAN_HE_GROUPS[sg];
            if (group.indexOf(maleSX) !== -1 && group.indexOf(daySX) !== -1) {
              var alreadyHas = false;
              for (var jl = 0; jl < jiShenList.length; jl++) {
                if (jiShenList[jl] === '与男方三合') alreadyHas = true;
              }
              if (!alreadyHas) {
                score += 2;
                jiShenList.push('与男方三合');
              }
            }
            if (group.indexOf(femaleSX) !== -1 && group.indexOf(daySX) !== -1) {
              var alreadyHas2 = false;
              for (var jl2 = 0; jl2 < jiShenList.length; jl2++) {
                if (jiShenList[jl2] === '与女方三合') alreadyHas2 = true;
              }
              if (!alreadyHas2) {
                score += 2;
                jiShenList.push('与女方三合');
              }
            }
          }

          // 六合
          if (SHENG_XIAO_LIU_HE_MAP[maleSX] === daySX) {
            var alreadyHas3 = false;
            for (var jl3 = 0; jl3 < jiShenList.length; jl3++) {
              if (jiShenList[jl3] === '与男方六合') alreadyHas3 = true;
            }
            if (!alreadyHas3) {
              score += 3;
              jiShenList.push('与男方六合');
            }
          }
          if (SHENG_XIAO_LIU_HE_MAP[femaleSX] === daySX) {
            var alreadyHas4 = false;
            for (var jl4 = 0; jl4 < jiShenList.length; jl4++) {
              if (jiShenList[jl4] === '与女方六合') alreadyHas4 = true;
            }
            if (!alreadyHas4) {
              score += 3;
              jiShenList.push('与女方六合');
            }
          }
        }

        if (isChong) {
          score -= 2;
        }

        return { score: score, jiShenList: jiShenList, isChong: isChong, dayZhi: dayZhi };
      }

      /**
       * 专业嫁娶择日
       * @param {number} year - 年份
       * @param {string} maleSX - 男方生肖
       * @param {string} femaleSX - 女方生肖
       * @returns {Array} 吉日列表
       */
      function getWeddingDatesProfessional(year, maleSX, femaleSX) {
        // 获取天赦日集合
        var tianSheDays = getTianSheDays(year);
        var tianSheSet = {};
        for (var ts = 0; ts < tianSheDays.length; ts++) {
          var tsd = tianSheDays[ts];
          tianSheSet[tsd.year + '-' + tsd.month + '-' + tsd.day] = true;
        }

        var result = [];

        for (var m = 0; m < 12; m++) {
          var monthNum = m + 1;
          var maxDay = getMonthDays(year, monthNum);

          for (var d = 1; d <= maxDay; d++) {
            // 排除四离日、四绝日、杨公忌日
            if (isSiLi(year, monthNum, d) || isSiJue(year, monthNum, d)) {
              continue;
            }
            if (isYangGongJi(monthNum, d)) {
              continue;
            }

            var dayZhi = getDayZhiByDate(year, monthNum, d);
            if (!dayZhi) continue;

            var scored = scoreDay(year, monthNum, d, maleSX, femaleSX, tianSheSet);
            var score = scored.score;
            var jiShenList = scored.jiShenList;
            var isChong = scored.isChong;

            if (score >= 4) {
              var avoidList = getAvoidShengXiao(dayZhi, maleSX, femaleSX);

              var reason = '婚嫁吉日';
              if (jiShenList.length > 0) {
                reason = jiShenList.join('、');
              }
              if (isChong) {
                reason += ' ⚠️冲生肖';
              }

              result.push({
                month: MONTH_NAMES[m],
                monthNum: monthNum,
                day: d,
                date: year + '年' + monthNum + '月' + d + '日',
                reason: reason,
                isChong: isChong,
                dayZhi: dayZhi,
                avoidList: avoidList,
                score: score,
                jiShenList: jiShenList,
                sortKey: year * 10000 + monthNum * 100 + d
              });
            }
          }
        }

        // 排序：先按得分降序，再按日期升序
        result.sort(function(a, b) {
          if (b.score !== a.score) {
            return b.score - a.score;
          }
          return a.sortKey - b.sortKey;
        });

        return result;
      }

      // 第11块：八步合婚核心

      /**
       * 八步合婚
       * @param {Object} maleBA - 男方八字
       * @param {Object} femaleBA - 女方八字
       * @param {number} maleYear - 男方出生年
       * @param {number} femaleYear - 女方出生年
       * @param {string} maleName - 男方姓名
       * @param {string} femaleName - 女方姓名
       * @param {string} maleGender - 男方性别
       * @param {string} femaleGender - 女方性别
       * @returns {Object} { steps, grade, score }
       */
      function eightSteps(maleBA, femaleBA, maleYear, femaleYear, maleName, femaleName, maleGender, femaleGender) {
        var steps = [];

        // ----- 第一步：纳音五行 -----
        var maleNaYin = getNaYin(maleBA.year.join(''));
        var femaleNaYin = getNaYin(femaleBA.year.join(''));
        var maleWuxing = NA_YIN_TO_WUXING[maleNaYin] || '木';
        var femaleWuxing = NA_YIN_TO_WUXING[femaleNaYin] || '木';
        var shengKe = getWuXingShengKe(maleWuxing, femaleWuxing);
        var step1Score = shengKe.includes('生') ? 9 : (shengKe.includes('比') ? 6 : 3);
        steps.push({
          title: '第一步 · 纳音五行',
          content: '【男方纳音】: ' + maleNaYin + ' (' + maleWuxing + ')\n【女方纳音】: ' + femaleNaYin + ' (' + femaleWuxing +
            ')\n【五行生克】: ' + shengKe,
          score: step1Score
        });

        // ----- 第二步：生肖六合三合 -----
        var maleSX = getShengXiao(maleYear);
        var femaleSX = getShengXiao(femaleYear);
        var heStatus = '无特殊';
        var step2Score = 3;

        // 检查六合
        if (SHENG_XIAO_LIU_HE_MAP[maleSX] === femaleSX) {
          heStatus = '六合 (大吉)';
          step2Score = 10;
        } else {
          // 检查三合
          for (var g = 0; g < SAN_HE_GROUPS.length; g++) {
            var group = SAN_HE_GROUPS[g];
            if (group.indexOf(maleSX) !== -1 && group.indexOf(femaleSX) !== -1) {
              heStatus = '三合 (吉)';
              step2Score = 8;
              break;
            }
          }
        }
        steps.push({
          title: '第二步 · 生肖六合/三合',
          content: '【男方生肖】: ' + maleSX + '\n【女方生肖】: ' + femaleSX + '\n【合局结果】: ' + heStatus,
          score: step2Score
        });

        // ----- 第三步：日干五行生克 -----
        var maleDayGan = maleBA.day[0];
        var femaleDayGan = femaleBA.day[0];
        var mG = GAN_WUXING_MAP[maleDayGan] || '木';
        var fG = GAN_WUXING_MAP[femaleDayGan] || '木';
        var shengKe2 = getWuXingShengKe(mG, fG);
        var step3Score = shengKe2.includes('生') ? 9 : (shengKe2.includes('比') ? 6 : 3);
        steps.push({
          title: '第三步 · 日干五行生克',
          content: '【男方日干】: ' + maleDayGan + ' (' + mG + ')\n【女方日干】: ' + femaleDayGan + ' (' + fG + ')\n【五行生克】: ' +
            shengKe2,
          score: step3Score
        });

        // ----- 第四步：神煞互参 -----
        var maleShen = getShenSha(maleBA.day[0], maleBA.day[1], maleBA.month[0], maleBA.year[0]);
        var femaleShen = getShenSha(femaleBA.day[0], femaleBA.day[1], femaleBA.month[0], femaleBA.year[0]);
        var maleHasTianYi = maleShen.indexOf('天乙贵人: 无') === -1 && maleShen.indexOf('天乙贵人: ') !== -1;
        var femaleHasTianYi = femaleShen.indexOf('天乙贵人: 无') === -1 && femaleShen.indexOf('天乙贵人: ') !== -1;
        var hasTianYi = maleHasTianYi && femaleHasTianYi;
        var step4Score = hasTianYi ? 8 : 5;
        steps.push({
          title: '第四步 · 神煞互参',
          content: '【男方神煞】: ' + maleShen + '\n【女方神煞】: ' + femaleShen + '\n【神煞互见】: 吉凶参半，以天乙、文昌为吉。',
          score: step4Score
        });

        // ----- 第五步：配偶星 -----
        var malePei = getPeiOuXing(maleBA.day[0], 'male');
        var femalePei = getPeiOuXing(femaleBA.day[0], 'female');
        var malePeiWuxing = malePei.match(/正财\(妻星\): (\w+)/);
        var femalePeiWuxing = femalePei.match(/正官\(夫星\): (\w+)/);
        var step5Score = 5;
        if (malePeiWuxing && femalePeiWuxing) {
          var mW = malePeiWuxing[1];
          var fW = femalePeiWuxing[1];
          if (getWuXingShengKe(mW, fW).includes('生')) {
            step5Score = 9;
          } else if (mW === fW) {
            step5Score = 7;
          } else {
            step5Score = 5;
          }
        }
        steps.push({
          title: '第五步 · 配偶星',
          content: '【男方配偶星】: ' + malePei + '\n【女方配偶星】: ' + femalePei + '\n【综合小结】: 财官得位，夫妻和谐。',
          score: step5Score
        });

        // ----- 第六步：大运配合 -----
        var maleDaYun = getDaYun(maleBA.year[0], maleBA.month[0], maleBA.month[1], maleGender,
          maleBA.solarDate.year, maleBA.solarDate.month, maleBA.solarDate.day);
        var femaleDaYun = getDaYun(femaleBA.year[0], femaleBA.month[0], femaleBA.month[1], femaleGender,
          femaleBA.solarDate.year, femaleBA.solarDate.month, femaleBA.solarDate.day);
        var daYunSync = Math.abs(maleDaYun.startAge - femaleDaYun.startAge) <= 2;
        var step6Score = daYunSync ? 8 : 5;
        steps.push({
          title: '第六步 · 大运配合',
          content: '【男方大运】: ' + maleDaYun.list.join(' → ') + ' (起运: ' + maleDaYun.startAge + '岁)\n【女方大运】: ' +
            femaleDaYun.list.join(' → ') + ' (起运: ' + femaleDaYun.startAge + '岁)\n【综合小结】: ' + (daYunSync ?
              '大运同步，运势相合。' : '大运略有差异，需相互体谅。'),
          score: step6Score
        });

        // ----- 第七步：五行互补（改进版） -----
        var wuXingResult = getWuXingBuJi(maleBA, femaleBA);
        var wuXingMatch = wuXingResult.match(/木: (\d+), 火: (\d+), 土: (\d+), 金: (\d+), 水: (\d+)/);
        var step7Score = 6;
        if (wuXingMatch) {
          var wood = parseInt(wuXingMatch[1]);
          var fire = parseInt(wuXingMatch[2]);
          var earth = parseInt(wuXingMatch[3]);
          var metal = parseInt(wuXingMatch[4]);
          var water = parseInt(wuXingMatch[5]);
          var values = [wood, fire, earth, metal, water];
          var totalCount = wood + fire + earth + metal + water;

          var hasAll = wood > 0 && fire > 0 && earth > 0 && metal > 0 && water > 0;
          var avg = totalCount / 5;
          var variance = 0;
          for (var i = 0; i < values.length; i++) {
            variance += Math.pow(values[i] - avg, 2);
          }
          variance /= 5;
          var stdDev = Math.sqrt(variance);

          if (hasAll && stdDev < 1.5) {
            step7Score = 10;
          } else if (hasAll && stdDev < 3) {
            step7Score = 9;
          } else if (hasAll) {
            step7Score = 8;
          } else if (stdDev < 2) {
            step7Score = 7;
          } else if (stdDev < 4) {
            step7Score = 6;
          } else {
            step7Score = 4;
          }
          if (totalCount < 8) step7Score = Math.max(step7Score - 1, 3);
        }
        steps.push({
          title: '第七步 · 五行互补',
          content: '【八字五行分布】: ' + wuXingResult + '\n【综合小结】: 五行均衡，互补为佳。',
          score: step7Score
        });

        // ----- 第八步：综合评判 -----
        var totalScore = steps.reduce(function(sum, s) { return sum + s.score; }, 0);
        var avgScore = totalScore / steps.length;
        var finalScore = Math.round(avgScore);
        var grade = finalScore >= 7 ? '上等婚 · 天作之合' : (finalScore >= 5 ? '中等婚 · 相敬如宾' : '下等婚 · 需磨合');
        steps.push({
          title: '第八步 · 综合评判',
          content: '【综合得分】: ' + finalScore + ' (满分10)\n【最终判词】: ' + grade + '\n【八步合婚】: 以传统五行、生肖、神煞综合论断。',
          score: finalScore
        });

        return { steps: steps, grade: grade, score: finalScore };
      }

        maleMonthInput.classList.remove('error');
        maleDayInput.classList.remove('error');
        femaleYearInput.classList.remove('error');
        femaleMonthInput.classList.remove('error');
        femaleDayInput.classList.remove('error');

        var mY = parseInt(maleYearInput.value);
        var mM = parseInt(maleMonthInput.value);
        var mD = parseInt(maleDayInput.value);
        var fY = parseInt(femaleYearInput.value);
        var fM = parseInt(femaleMonthInput.value);
        var fD = parseInt(femaleDayInput.value);

        if (isNaN(mY) || mY < 1900 || mY > 2100) {
          maleDateError.textContent = '⚠️ 年份范围 1900-2100';
          maleYearInput.classList.add('error');
          isValid = false;
        }
        if (isNaN(mM) || mM < 1 || mM > 12) {
          maleDateError.textContent = '⚠️ 月份范围 1-12';
          maleMonthInput.classList.add('error');
          isValid = false;
        }
        if (isNaN(mD) || mD < 1 || mD > 31) {
          maleDateError.textContent = '⚠️ 日期范围 1-31';
          maleDayInput.classList.add('error');
          isValid = false;
        }
        if (isNaN(fY) || fY < 1900 || fY > 2100) {
          femaleDateError.textContent = '⚠️ 年份范围 1900-2100';
          femaleYearInput.classList.add('error');
          isValid = false;
        }
        if (isNaN(fM) || fM < 1 || fM > 12) {
          femaleDateError.textContent = '⚠️ 月份范围 1-12';
          femaleMonthInput.classList.add('error');
          isValid = false;
        }
        if (isNaN(fD) || fD < 1 || fD > 31) {
          femaleDateError.textContent = '⚠️ 日期范围 1-31';
          femaleDayInput.classList.add('error');
          isValid = false;
        }

        if (!isNaN(mY) && !isNaN(mM) && !isNaN(mD)) {
          if (!isValidDate(mY, mM, mD)) {
            maleDateError.textContent = '⚠️ 日期不存在，请检查年月日';
            maleYearInput.classList.add('error');
            maleMonthInput.classList.add('error');
            maleDayInput.classList.add('error');
            isValid = false;
          }
        }
        if (!isNaN(fY) && !isNaN(fM) && !isNaN(fD)) {
          if (!isValidDate(fY, fM, fD)) {
            femaleDateError.textContent = '⚠️ 日期不存在，请检查年月日';
            femaleYearInput.classList.add('error');
            femaleMonthInput.classList.add('error');
            femaleDayInput.classList.add('error');
            isValid = false;
          }
        }

        if (!isValid) {
          setTimeout(scrollToFirstError, 100);
        }

        return isValid;
      }

      /**
       * 渲染八步结果
       * @param {Array} stepsData - 步骤数据
       * @param {string} maleName - 男方姓名
       * @param {string} femaleName - 女方姓名
       * @param {string} grade - 最终等级
       */
      function renderSteps(stepsData, maleName, femaleName, grade) {
        if (!stepsData || stepsData.length === 0) {
          stepList.innerHTML =
            '<div class="step-item"><div class="step-content" style="background: rgba(255,255,255,0.03);">请点击「合婚 · 八步演算」查看八字合婚详解</div></div>';
          return;
        }

        var html = '';
        stepsData.forEach(function(s, idx) {
          // 安全地格式化内容（使用 textContent 风格，但保留HTML标签）
          var formattedContent = s.content.replace(/【([^】]+)】/g, '<span class="label">$1</span>');
          html += '<div class="step-item">\n' +
            '            <div class="step-header">\n' +
            '              <span class="step-num">' + (idx + 1) + '</span>\n' +
            '              <span class="step-title">' + s.title + '</span>\n' +
            '              <span class="step-badge">' + (idx === 7 ? '★ 终判' : '') + '</span>\n' +
            '            </div>\n' +
            '            <div class="step-content">' + formattedContent + '</div>\n' +
            '          </div>';
        });
        stepList.innerHTML = html;
      }

      /**
       * 更新结果摘要
       * @param {string} grade - 等级
       * @param {string} maleName - 男方姓名
       * @param {string} femaleName - 女方姓名
       */
      function updateSummary(grade, maleName, femaleName) {
        if (grade) {
          resultSummary.innerHTML = '💞 ' + maleName + ' 与 ' + femaleName + ' · ' + grade;
        } else {
          resultSummary.innerHTML = '💞 等待演算 ...';
        }
      }

      /**
       * 更新嫁娶择日面板
       */
      function updateWeddingPanel() {
        var year = new Date().getFullYear();
        var maleSX = getShengXiao(parseInt(maleYearInput.value) || 1990);
        var femaleSX = getShengXiao(parseInt(femaleYearInput.value) || 1992);
        var dates = getWeddingDatesProfessional(year, maleSX, femaleSX);

        var monthGroups = {};
        for (var mi = 0; mi < MONTH_NAMES.length; mi++) {
          monthGroups[MONTH_NAMES[mi]] = [];
        }

        dates.forEach(function(d) {
          if (monthGroups[d.month]) {
            monthGroups[d.month].push(d);
          }
        });

        var html = '<div class="wedding-summary-line">💒 共筛选出 <strong style="color:#8ab4ff;">' + dates.length +
          '</strong> 个婚嫁吉日（得分 ≥ 4），按得分降序排列</div>';

        for (var mi2 = 0; mi2 < MONTH_NAMES.length; mi2++) {
          var monthName = MONTH_NAMES[mi2];
          var items = monthGroups[monthName] || [];
          if (items.length === 0) continue;

          var monthTotalScore = 0;
          for (var si = 0; si < items.length; si++) {
            monthTotalScore += items[si].score;
          }
          var avgScore = (monthTotalScore / items.length).toFixed(1);

          html += '<div class="month-collapse">';
          html += '  <div class="month-collapse-header" data-month="' + monthName + '">';
          html += '    <span class="month-name">📆 ' + monthName + '</span>';
          html += '    <span class="month-badge">' + items.length + '日  ⭐' + avgScore + '分</span>';
          html += '    <span class="collapse-arrow">▼</span>';
          html += '  </div>';
          html += '  <div class="month-collapse-body">';

          items.sort(function(a, b) { return b.score - a.score; });

          for (var di = 0; di < items.length; di++) {
            var d = items[di];
            var flag = d.isChong ? '<span class="flag-bad">⚠️</span>' : '<span class="flag-good">✓</span>';

            var avoidStr = '';
            if (d.avoidList && d.avoidList.length > 0) {
              var parts = [];
              for (var a = 0; a < d.avoidList.length; a++) {
                var item = d.avoidList[a];
                var label = '';
                if (item.type === '冲犯新人') label = '‼️';
                else if (item.type === '相冲') label = '⚡';
                else if (item.type === '三煞') label = '⚠️';
                parts.push(label + item.shengxiao);
              }
              avoidStr = ' <span class="avoid-info">[避: ' + parts.join('、') + ']</span>';
            }

            var scoreBadge = '<span class="score-badge">⭐' + d.score + '分</span>';

            html += '    <div class="day-item">' +
              flag + ' ' + d.date +
              ' <span style="color:#8899bb;font-size:0.82rem;">(' + d.reason + ')</span>' +
              avoidStr + ' ' + scoreBadge +
              '</div>';
          }

          html += '  </div>';
          html += '</div>';
        }

        html +=
          '<div style="margin-top:12px;padding:10px 14px;background:rgba(255,255,255,0.03);border-radius:12px;font-size:0.85rem;color:#8899bb;line-height:1.9;">' +
          '💒 择日依据：天德合日、月德合日、天赦日、三合六合等吉神，排除四离四绝、杨公忌日。<br>' +
          '✓ 吉日  ⚠️ 冲生肖日（建议避开）<br>' +
          '‼️ 冲犯新人  ⚡ 日支相冲  ⚠️ 犯三煞<br>' +
          '📌 注：此为专业简化版推算，建议结合专业择日师详勘。' +
          '</div>';

        extraPanel.innerHTML = html;
      }

      /**
       * 主计算函数
       */
      function calculate() {
        if (!validateInputs()) {
          return;
        }

        // 显示加载遮罩
        loadingOverlay.classList.add('active');
        calcBtn.disabled = true;

        // 使用 setTimeout 让 UI 有时间更新
        setTimeout(function() {
          try {
            var maleSurname = maleSurnameInput.value.trim();
            var maleGivenName = maleGivenNameInput.value.trim();
            var femaleSurname = femaleSurnameInput.value.trim();
            var femaleGivenName = femaleGivenNameInput.value.trim();

            var maleName = maleSurname + maleGivenName;
            var femaleName = femaleSurname + femaleGivenName;

            var maleCal = document.querySelector('input[name="maleCal"]:checked').value === 'lunar';
            var femaleCal = document.querySelector('input[name="femaleCal"]:checked').value === 'lunar';
            var mY = parseInt(maleYearInput.value) || 1990;
            var mM = parseInt(maleMonthInput.value) || 5;
            var mD = parseInt(maleDayInput.value) || 12;
            var mH = parseInt(maleHourInput.value) || 8;
            var fY = parseInt(femaleYearInput.value) || 1992;
            var fM = parseInt(femaleMonthInput.value) || 8;
            var fD = parseInt(femaleDayInput.value) || 20;
            var fH = parseInt(femaleHourInput.value) || 14;

            var maleGender = document.querySelector('input[name="maleGender"]:checked').value || 'male';
            var femaleGender = document.querySelector('input[name="femaleGender"]:checked').value || 'female';

            var maleBazi = getBazi(mY, mM, mD, mH, maleGender, maleCal);
            var femaleBazi = getBazi(fY, fM, fD, fH, femaleGender, femaleCal);

            var result = eightSteps(maleBazi, femaleBazi, mY, fY, maleName, femaleName, maleGender, femaleGender);
            renderSteps(result.steps, maleName, femaleName, result.grade);
            updateSummary(result.grade, maleName, femaleName);

            // 更新嫁娶择日
            updateWeddingPanel();

          } catch (e) {
            console.error('计算错误:', e);
            stepList.innerHTML =
              '<div class="step-item"><div class="step-content" style="color: #ff6b6b;">⚠️ 计算出现错误，请检查输入数据后重试。</div></div>';
          } finally {
            loadingOverlay.classList.remove('active');
            calcBtn.disabled = false;
          }
        }, 150); // 稍微增加延迟，让遮罩显示更平滑
      }

      /**
       * 重置示例数据
       */
      function resetExample() {
        maleSurnameInput.value = '王';
        maleGivenNameInput.value = '林';
        femaleSurnameInput.value = '李';
        femaleGivenNameInput.value = '慕婉';
        maleYearInput.value = 1990;
        maleMonthInput.value = 5;
        maleDayInput.value = 12;
        maleHourInput.value = 8;
        femaleYearInput.value = 1992;
        femaleMonthInput.value = 8;
        femaleDayInput.value = 20;
        femaleHourInput.value = 14;

        document.querySelector('input[name="maleCal"][value="solar"]').checked = true;
        document.querySelector('input[name="femaleCal"][value="solar"]').checked = true;
        document.querySelector('input[name="maleGender"][value="male"]').checked = true;
        document.querySelector('input[name="femaleGender"][value="female"]').checked = true;

        document.getElementById('maleHourLabel').textContent = getShiChen(8);
        document.getElementById('femaleHourLabel').textContent = getShiChen(14);

        document.querySelectorAll('.input-error').forEach(function(el) { el.textContent = ''; });
        document.querySelectorAll('.error').forEach(function(el) { el.classList.remove('error'); });

        calculate();
      }

      // ================================================================
      // 第13块：事件绑定
      // ================================================================

      // 月份折叠交互（事件委托）
      document.addEventListener('click', function(e) {
        var header = e.target.closest('.month-collapse-header');
        if (!header) return;
        var body = header.nextElementSibling;
        var arrow = header.querySelector('.collapse-arrow');
        if (body) {
          body.classList.toggle('open');
          if (arrow) {
            arrow.classList.toggle('open');
          }
        }
      });

      // 按钮事件
      calcBtn.addEventListener('click', calculate);
      resetBtn.addEventListener('click', resetExample);

      // 页面加载后初始化
      window.addEventListener('load', function() {
        bindHourTranslation();
        // 延迟执行，确保所有元素已渲染
        setTimeout(calculate, 50);
      });

    })();
  </script>
