<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>八字合婚 · 八步演算</title>
  <!-- 引入 lunar-javascript 农历库 -->
  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.6.12/lunar.min.js">
  </script>
  <!-- 引入 chinese-stroke 汉字笔画库 -->
  <script src="https://cdn.jsdelivr.net/npm/chinese-stroke@1.0.0/dist/chinese-stroke.min.js">
  </script>
  <style>
    /* ============================================================
    第1块：全局重置 & 基础样式
    作用：清除浏览器默认边距，设置 body 背景渐变、字体
    ============================================================ */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      /* 深空蓝紫渐变，营造深邃星空感 */
      background: linear-gradient(145deg, #0b0e1a 0%, #1a1f35 40%, #0d1b2a 100%);
      font-family: 'Segoe UI', '华文楷体', 'KaiTi', 'Microsoft YaHei', serif;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #c8d0e0;
    }
    .container {
      max-width: 1000px;
      width: 100%;
      /* 毛玻璃效果卡片 */
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      border-radius: 32px;
      padding: 28px 24px 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: 6px;
      text-align: center;
      border-bottom: 2px dashed rgba(255, 255, 255, 0.08);
      padding-bottom: 16px;
      margin-bottom: 24px;
      color: #e8edf5;
      text-shadow: 0 0 40px rgba(60, 120, 255, 0.10);
    }
    h1 small {
      font-size: 0.9rem;
      letter-spacing: 2px;
      color: #8899bb;
      display: block;
      margin-top: 6px;
      font-weight: 300;
    }
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 24px;
      background: rgba(255, 255, 255, 0.04);
      padding: 20px 18px;
      border-radius: 28px;
      margin-bottom: 28px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .input-group label {
      font-size: 0.95rem;
      font-weight: 500;
      color: #aabbdd;
      letter-spacing: 1px;
      margin-left: 6px;
    }
    .input-group input {
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.05);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: 0.2s;
      color: #e8edf5;
      min-width: 0;
      width: 100%;
    }
    .input-group input:focus {
      border-color: rgba(100, 180, 255, 0.4);
      box-shadow: 0 0 0 3px rgba(60, 120, 255, 0.15);
    }
    .input-group input::placeholder {
      color: #556688;
    }
    .input-group input[type="number"] {
      -moz-appearance: textfield;
    }
    .input-group input[type="number"]::-webkit-outer-spin-button,
    .input-group input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }
    .input-group input.error {
      border-color: rgba(255, 80, 80, 0.5);
      box-shadow: 0 0 0 3px rgba(255, 80, 80, 0.15);
    }
    .input-error {
      color: #ff6b6b;
      font-size: 0.78rem;
      margin-left: 10px;
      margin-top: 2px;
      min-height: 18px;
    }
    /* 姓名双栏布局 - 标签在输入框前面 */
    .name-row {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .name-row .name-label {
      font-size: 0.85rem;
      color: #8899bb;
      white-space: nowrap;
      font-weight: 500;
      letter-spacing: 0.5px;
      min-width: 20px;
    }
    .name-row .name-input-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
      min-width: 60px;
    }
    .name-row .name-input-wrap input {
      flex: 1;
      min-width: 40px;
      padding: 8px 10px;
    }
    .name-row .name-input-wrap .label-inline {
      font-size: 0.75rem;
      color: #556688;
      background: rgba(255, 255, 255, 0.05);
      padding: 2px 8px;
      border-radius: 12px;
      white-space: nowrap;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .gender-group {
      display: flex;
      gap: 18px;
      align-items: center;
      margin-top: 4px;
      padding-left: 6px;
      flex-wrap: wrap;
    }
    .gender-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 400;
      font-size: 0.95rem;
      cursor: pointer;
      color: #aabbdd;
    }
    .gender-group input[type="radio"] {
      width: 18px;
      height: 18px;
      accent-color: #4A90E2;
    }
    .calendar-toggle {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 6px;
      margin-left: 6px;
      flex-wrap: wrap;
    }
    .calendar-toggle label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 400;
      font-size: 0.9rem;
      cursor: pointer;
      color: #aabbdd;
    }
    .calendar-toggle input[type="radio"] {
      width: 16px;
      height: 16px;
      accent-color: #4A90E2;
    }
    .date-row {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      align-items: center;
    }
    .date-row input {
      flex: 1 1 0;
      min-width: 42px;
      padding: 8px 6px;
      font-size: 0.92rem;
    }
    .date-row .hour-label {
      font-size: 0.85rem;
      color: #8899bb;
      background: rgba(255, 255, 255, 0.06);
      padding: 4px 10px;
      border-radius: 30px;
      white-space: nowrap;
      margin-left: 2px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .action-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      margin: 24px 0 20px;
    }
    .btn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.10);
      padding: 12px 36px;
      border-radius: 60px;
      font-size: 1.15rem;
      font-weight: 500;
      color: #c8d0e0;
      letter-spacing: 2px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.2);
      font-family: inherit;
      flex: 1 1 0;
      min-width: 180px;
      max-width: 260px;
      white-space: nowrap;
    }
    .btn-primary {
      background: rgba(60, 120, 255, 0.20);
      color: #8ab4ff;
      box-shadow: 0 4px 0 rgba(30, 80, 200, 0.3);
      border-color: rgba(60, 120, 255, 0.25);
    }
    .btn-primary:hover {
      background: rgba(60, 120, 255, 0.30);
      transform: translateY(-2px);
      box-shadow: 0 6px 0 rgba(30, 80, 200, 0.4);
      border-color: rgba(60, 120, 255, 0.4);
    }
    .btn-primary:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 rgba(30, 80, 200, 0.3);
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.2);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }
    .steps-container {
      margin: 28px 0 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 28px;
      padding: 8px 8px 8px 8px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .step-item {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 40px;
      padding: 16px 20px;
      margin-bottom: 10px;
      border-left: 6px solid rgba(60, 120, 255, 0.3);
      transition: 0.15s;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
    }
    .step-item:last-child {
      margin-bottom: 0;
    }
    .step-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .step-num {
      background: rgba(60, 120, 255, 0.25);
      color: #8ab4ff;
      border-radius: 40px;
      padding: 0 16px;
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 28px;
      letter-spacing: 1px;
    }
    .step-title {
      font-weight: 600;
      font-size: 1.2rem;
      color: #e8edf5;
    }
    .step-badge {
      font-size: 0.75rem;
      background: rgba(255, 255, 255, 0.06);
      padding: 2px 14px;
      border-radius: 30px;
      color: #8899bb;
      margin-left: 4px;
    }
    .step-content {
      margin-top: 10px;
      font-size: 0.98rem;
      line-height: 1.8;
      color: #c8d0e0;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 24px;
      padding: 12px 18px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }
    .step-content .label {
      font-weight: 600;
      color: #8ab4ff;
    }
    .step-content .value {
      color: #c8d0e0;
    }
    .result-summary {
      margin-top: 24px;
      padding: 18px 22px;
      background: rgba(60, 120, 255, 0.10);
      border-radius: 60px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: 500;
      letter-spacing: 2px;
      border: 1px solid rgba(60, 120, 255, 0.15);
      color: #8ab4ff;
    }
    /* ---- 多功能合婚栏 (仅保留嫁娶择日) ---- */
    .extra-marriage-section {
      margin-top: 20px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 28px;
      padding: 16px 18px 18px 18px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .extra-marriage-section .extra-title {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 500;
      color: #8ab4ff;
      letter-spacing: 3px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .extra-marriage-section .extra-panel {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 24px;
      padding: 2px 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.98rem;
      line-height: 1.8;
      color: #c8d0e0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      min-height: auto;
      max-height: 600px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(60, 120, 255, 0.3) transparent;
    }
    
    /* Chrome/Safari/Edge 滚动条样式 */
    .extra-marriage-section .extra-panel::-webkit-scrollbar {
      width: 6px;
    }
    .extra-marriage-section .extra-panel::-webkit-scrollbar-track {
      background: transparent;
      border-radius: 24px;
      margin: 4px 0;
    }
    .extra-marriage-section .extra-panel::-webkit-scrollbar-thumb {
      background: rgba(60, 120, 255, 0.3);
      border-radius: 12px;
      transition: background 0.2s;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    .extra-marriage-section .extra-panel::-webkit-scrollbar-thumb:hover {
      background: rgba(60, 120, 255, 0.5);
    }
    .extra-marriage-section .extra-panel::-webkit-scrollbar-button {
      display: none;
    }
    .extra-marriage-section .extra-panel .label {
      font-weight: 600;  
      color: #8ab4ff;
    }
    /* 月份折叠样式 */
    .month-collapse {
      margin-bottom: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      overflow: hidden;
    }
    .month-collapse-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.04);
      cursor: pointer;
      transition: 0.2s;
      user-select: none;
      border-radius: 12px;
    }
    .month-collapse-header:hover {
      background: rgba(255, 255, 255, 0.08);
    }
    .month-collapse-header .month-name {
      font-weight: 600;
      font-size: 1rem;
      color: #e8edf5;
    }
    .month-collapse-header .month-badge {
      font-size: 0.75rem;
      color: #8899bb;
      background: rgba(255, 255, 255, 0.06);
      padding: 2px 12px;
      border-radius: 20px;
    }
    .month-collapse-header .collapse-arrow {
      font-size: 0.8rem;
      color: #8899bb;
      transition: transform 0.25s ease;
    }
    .month-collapse-header .collapse-arrow.open {
      transform: rotate(180deg);
    }
    .month-collapse-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
      padding: 0 6px;
    }
    .month-collapse-body.open {
      max-height: 3000px;
      padding: 10px 6px;
    }
    .month-collapse-body .day-item {
      padding: 3px 6px;
      font-size: 0.9rem;
      line-height: 1.9;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      color: #c8d0e0;
    }
    .month-collapse-body .day-item:last-child {
      border-bottom: none;
    }
    .month-collapse-body .day-item .flag-good {
      color: #66bb6a;
    }
    .month-collapse-body .day-item .flag-bad {
      color: #ff6b6b;
    }
    .month-collapse-body .day-item .avoid-info {
      color: #8899bb;
      font-size: 0.82rem;
    }
    .month-collapse-body .day-item .score-badge {
      font-size: 0.7rem;
      background: rgba(60, 120, 255, 0.15);
      color: #8ab4ff;
      padding: 0 8px;
      border-radius: 12px;
      margin-left: 4px;
    }
    .wedding-summary-line {
      margin-bottom: 12px;
      font-size: 0.92rem;
      color: #aabbdd;
      text-align: center;
    }
    .footnote {
      margin-top: 20px;
      text-align: center;
      font-size: 0.8rem;
      color: #556688;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding-top: 16px;
      flex-shrink: 0;
    }
    /* 加载提示 */
    .loading-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(11, 14, 26, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
    }
    .loading-overlay.active {
      display: flex;
    }
    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(60, 120, 255, 0.15);
      border-top-color: #8ab4ff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      color: #8ab4ff;
      font-size: 1.1rem;
      letter-spacing: 3px;
    }

    /* 响应式 */
    @media (max-width: 820px) {
      .input-grid {
        grid-template-columns: 1fr 1fr;
        gap: 12px 16px;
        padding: 16px 14px;
      }
      .container {
        padding: 20px 16px;
      }
      .date-row input {
        min-width: 36px;
        font-size: 0.85rem;
        padding: 6px 4px;
      }
      .date-row .hour-label {
        font-size: 0.78rem;
        padding: 3px 8px;
      }
      .btn {
        min-width: 140px;
        max-width: 100%;
        flex: 1 1 100%;
        white-space: normal;
        padding: 10px 20px;
        font-size: 1rem;
      }
      .name-row .name-input-wrap input {
        padding: 6px 8px;
        font-size: 0.9rem;
      }
      .name-row .name-label {
        font-size: 0.78rem;
      }
    }
    @media (max-width: 640px) {
      .input-grid {
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 14px 12px;
      }
      .container {
        padding: 16px 12px;
      }
      .step-item {
        padding: 14px 14px;
      }
      .name-row {
        flex-wrap: nowrap;
      }
      .name-row .name-input-wrap {
        min-width: 50px;
      }
      .name-row .name-input-wrap input {
        min-width: 30px;
        font-size: 0.85rem;
        padding: 6px 6px;
      }
      .date-row input {
        min-width: 32px;
        font-size: 0.8rem;
        padding: 5px 3px;
      }
      .date-row .hour-label {
        font-size: 0.72rem;
        padding: 2px 6px;
      }
      .calendar-toggle {
        gap: 8px;
      }
      .calendar-toggle label {
        font-size: 0.8rem;
      }
      .gender-group {
        gap: 12px;
      }
      .gender-group label {
        font-size: 0.85rem;
      }
      .month-collapse-header {
        padding: 6px 10px;
      }
      .month-collapse-header .month-name {
        font-size: 0.9rem;
      }
      .month-collapse-body .day-item {
        font-size: 0.82rem;
        padding: 2px 4px;
      }
    }
  </style>
</head>
<body>
  <!-- 加载遮罩 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">🔮 天机演算中 ...</div>
  </div>

  <div class="container" id="app">
    <h1>⚛️ 八字合婚 <small>八步演算 · 天作之合</small></h1>

    <!-- 输入区 -->
    <div class="input-grid">
      <!-- 男方姓名 -->
      <div class="input-group">
        <label>👤 男方姓名</label>
        <div class="name-row">
          <span class="name-label">姓</span>
          <div class="name-input-wrap">
            <input type="text" id="maleSurname" value="王" placeholder="姓" maxlength="2">
          </div>
          <span class="name-label">名</span>
          <div class="name-input-wrap">
            <input type="text" id="maleGivenName" value="林" placeholder="名" maxlength="4">
          </div>
        </div>
        <div class="input-error" id="maleNameError"></div>
      </div>

      <!-- 女方姓名 -->
      <div class="input-group">
        <label>👩 女方姓名</label>
        <div class="name-row">
          <span class="name-label">姓</span>
          <div class="name-input-wrap">
            <input type="text" id="femaleSurname" value="李" placeholder="姓" maxlength="2">
          </div>
          <span class="name-label">名</span>
          <div class="name-input-wrap">
            <input type="text" id="femaleGivenName" value="慕婉" placeholder="名" maxlength="4">
          </div>
        </div>
        <div class="input-error" id="femaleNameError"></div>
      </div>

      <!-- 男方出生 -->
      <div class="input-group">
        <label>📅 男方出生</label>
        <div class="calendar-toggle">
          <label><input type="radio" name="maleCal" value="solar" checked> 公历</label>
          <label><input type="radio" name="maleCal" value="lunar"> 农历</label>
        </div>
        <div class="date-row">
          <input type="number" id="maleYear" value="1990" placeholder="年" style="flex:2;" min="1900" max="2100" maxlength="4" oninput="if(this.value.length>4) this.value=this.value.slice(0,4)">
          <input type="number" id="maleMonth" value="5" placeholder="月" style="flex:1;" min="1" max="12" maxlength="2" oninput="if(this.value.length>2) this.value=this.value.slice(0,2)">
          <input type="number" id="maleDay" value="12" placeholder="日" style="flex:1;" min="1" max="31" maxlength="2" oninput="if(this.value.length>2) this.value=this.value.slice(0,2)">
          <input type="number" id="maleHour" value="8" placeholder="时" style="flex:1;" min="0" max="23" maxlength="2" oninput="if(this.value.length>2) this.value=this.value.slice(0,2)">
          <span class="hour-label" id="maleHourLabel">辰时</span>
        </div>
        <div class="input-error" id="maleDateError"></div>
      </div>

      <!-- 女方出生 -->
      <div class="input-group">
        <label>📅 女方出生</label>
        <div class="calendar-toggle">
          <label><input type="radio" name="femaleCal" value="solar" checked> 公历</label>
          <label><input type="radio" name="femaleCal" value="lunar"> 农历</label>
        </div>
        <div class="date-row">
          <input type="number" id="femaleYear" value="1992" placeholder="年" style="flex:2;" min="1900" max="2100" maxlength="4" oninput="if(this.value.length>4) this.value=this.value.slice(0,4)">
          <input type="number" id="femaleMonth" value="8" placeholder="月" style="flex:1;" min="1" max="12" maxlength="2" oninput="if(this.value.length>2) this.value=this.value.slice(0,2)">

      // ---------- 农历转换 (使用 lunar-javascript) ----------
      function lunarToSolar(lunarYear, lunarMonth, lunarDay) {
        try {
          var lunar = Lunar.fromYmd(lunarYear, lunarMonth, lunarDay);
          if (!lunar) return null;
          var solar = lunar.getSolar();
          return {
            year: solar.getYear(),
            month: solar.getMonth(),
            day: solar.getDay()
          };
        } catch (e) {
          console.warn('农历转换失败，使用降级方案:', e);
          var targetMonth = lunarMonth;
          var targetDay = lunarDay;
          if (lunarMonth === 12) {
            targetMonth = 1;
          } else {
            targetMonth = Math.min(lunarMonth + 1, 12);
          }
          var maxDay = 30;
          if (targetMonth === 2) maxDay = 28;
          else if ([4, 6, 9, 11].indexOf(targetMonth) !== -1) maxDay = 30;
          else maxDay = 31;
          targetDay = Math.min(lunarDay + 1, maxDay);
          var targetYear = (lunarMonth === 12) ? lunarYear + 1 : lunarYear;
          return {
            year: targetYear,
            month: targetMonth,
            day: targetDay
          };
        }
      }

      // ============ 获取精确节气日期 (使用 lunar-javascript 库) ============
      var _jieQiCache = {};

      function getJieQiDate(year, month) {
        var cacheKey = year + '-' + month;
        if (_jieQiCache[cacheKey]) return _jieQiCache[cacheKey];
        
        try {
          var solar = Solar.fromYmd(year, month, 1);
          var lunar = solar.getLunar();
          var jq = lunar.getJieQiTable() || {};
          var jieMap = {
            '立春': 1, '惊蛰': 2, '清明': 3, '立夏': 4,
            '芒种': 5, '小暑': 6, '立秋': 7, '白露': 8,
            '寒露': 9, '立冬': 10, '大雪': 11, '小寒': 12
          };
          for (var key in jieMap) {
            if (jq[key]) {
              var dateStr = jq[key];
              if (typeof dateStr === 'string') {
                var match = dateStr.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
                if (match) {
                  var m = parseInt(match[2]);
                  var d = parseInt(match[3]);
                  if (m === month) {
                    var result = { name: key, day: d };
                    _jieQiCache[cacheKey] = result;
                    return result;
                  }
                }
              }
            }
          }
          _jieQiCache[cacheKey] = null;
          return null;
        } catch (e) {
          console.warn('获取节气日期失败:', e);
          _jieQiCache[cacheKey] = null;
          return null;
        }
      }

      // 获取多个节气日期
      function getJieQiDates(year) {
        var cacheKey = 'year-' + year;
        if (_jieQiCache[cacheKey]) return _jieQiCache[cacheKey];
        
        var result = {};
        var jieQiNames = ['立春', '惊蛰', '清明', '立夏', '芒种', '小暑', '立秋', '白露', '寒露', '立冬', '大雪', '小寒',
          '春分', '秋分', '夏至', '冬至'
        ];
        for (var i = 0; i < jieQiNames.length; i++) {
          var jq = getJieQiDate(year, i + 1);
          if (jq) {
            result[jieQiNames[i]] = { year: year, month: i + 1, day: jq.day };
          }
        }
        _jieQiCache[cacheKey] = result;
        return result;
      }

      // 获取立春日期
      function getLiChunDay(year) {
        try {
          var solar = Solar.fromYmd(year, 2, 1);
          var lunar = solar.getLunar();
          var jq = lunar.getJieQiTable() || {};
          if (jq['立春']) {
            var dateStr = jq['立春'];
            var match = dateStr.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
            if (match) {
              return parseInt(match[3]);
            }
          }
        } catch (e) {}
        return 4;
      }

      // ---------- 年柱排盘 ----------
      function getYearGanZhi(solarYear, solarMonth, solarDay) {
        var year = solarYear;
        var liChunDay = getLiChunDay(solarYear);
        if (solarMonth < 2 || (solarMonth === 2 && solarDay < liChunDay)) {
          year = solarYear - 1;
        }
        var gan = TIAN_GAN[(year - 4) % 10];
        var zhi = DI_ZHI[(year - 4) % 12];
        return { gan: gan, zhi: zhi, year: year };
      }

      // ========== 月柱排盘 ==========
      function getMonthGanZhi(solarYear, solarMonth, solarDay, yearGan) {
        function getJieQiDay(year, month, name) {
          try {
            var solar = Solar.fromYmd(year, month, 1);
            var lunar = solar.getLunar();
            var jq = lunar.getJieQiTable() || {};
            if (jq[name]) {
              var match = jq[name].match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
              if (match) return parseInt(match[3]);
            }
          } catch (e) {}
          return null;
        }

        var liChun = getJieQiDay(solarYear, 2, '立春') || 4;
        var jingZhe = getJieQiDay(solarYear, 3, '惊蛰') || 6;
        var qingMing = getJieQiDay(solarYear, 4, '清明') || 5;
        var liXia = getJieQiDay(solarYear, 5, '立夏') || 6;
        var mangZhong = getJieQiDay(solarYear, 6, '芒种') || 6;
        var xiaoShu = getJieQiDay(solarYear, 7, '小暑') || 7;
        var liQiu = getJieQiDay(solarYear, 8, '立秋') || 7;
        var baiLu = getJieQiDay(solarYear, 9, '白露') || 8;
        var hanLu = getJieQiDay(solarYear, 10, '寒露') || 8;
        var liDong = getJieQiDay(solarYear, 11, '立冬') || 7;
        var daXue = getJieQiDay(solarYear, 12, '大雪') || 7;
        var xiaoHan = getJieQiDay(solarYear, 1, '小寒') || 6;

        var jieQi = [
          { month: 2, day: liChun, zhi: '寅' },
          { month: 3, day: jingZhe, zhi: '卯' },
          { month: 4, day: qingMing, zhi: '辰' },
          { month: 5, day: liXia, zhi: '巳' },
          { month: 6, day: mangZhong, zhi: '午' },
          { month: 7, day: xiaoShu, zhi: '未' },
          { month: 8, day: liQiu, zhi: '申' },
          { month: 9, day: baiLu, zhi: '酉' },
          { month: 10, day: hanLu, zhi: '戌' },
          { month: 11, day: liDong, zhi: '亥' },
          { month: 12, day: daXue, zhi: '子' },
          { month: 1, day: xiaoHan, zhi: '丑' }
        ];

        var zhi = '寅';
        if (solarMonth === 1) {
          zhi = (solarDay >= xiaoHan) ? '丑' : '子';
        } else {
          for (var i = jieQi.length - 1; i >= 0; i--) {
            var jq = jieQi[i];
            var m = jq.month;
            var d = jq.day;
            if (m === 1) continue;
            if (solarMonth > m || (solarMonth === m && solarDay >= d)) {
              zhi = jq.zhi;
              break;
            }
          }
        }

        var yearGanIndex = TIAN_GAN.indexOf(yearGan);
        var startIndex = (yearGanIndex * 2 + 2) % 10;
        var zhiIndex = DI_ZHI.indexOf(zhi);
        var monthZhiOffset = (zhiIndex - 2 + 12) % 12;
        var ganIndex = (startIndex + monthZhiOffset) % 10;
        var gan = TIAN_GAN[ganIndex];
        
        return { gan: gan, zhi: zhi };
      }

      // ---------- 日柱排盘 ----------
      function getDayGanZhi(solarYear, solarMonth, solarDay) {
        try {
          var solar = Solar.fromYmd(solarYear, solarMonth, solarDay);
          var lunar = solar.getLunar();
          var dayGanZhi = lunar.getDayInGanZhi();
          if (dayGanZhi && dayGanZhi.length === 2) {
            return [dayGanZhi[0], dayGanZhi[1]];
          }
        } catch (e) {
          console.warn('日柱获取失败，使用降级算法:', e);
        }
        
        var baseUTC = Date.UTC(1900, 0, 1);
        var targetUTC = Date.UTC(solarYear, solarMonth - 1, solarDay);
        var diffDays = Math.floor((targetUTC - baseUTC) / 86400000);
        var baseGanIndex = 0;
        var baseZhiIndex = 10;
        var ganIndex = ((baseGanIndex + diffDays) % 10 + 10) % 10;
        var zhiIndex = ((baseZhiIndex + diffDays) % 12 + 12) % 12;
        return [TIAN_GAN[ganIndex], DI_ZHI[zhiIndex]];
      }

      // ---------- 时柱排盘 ----------
      function getHourGanZhi(dayGan, hour) {
        var dayGanIndex = TIAN_GAN.indexOf(dayGan);
        var startHourGanIndex = (dayGanIndex % 5) * 2;
        var hourZhiIndex = Math.floor((hour + 1) / 2) % 12;
        var ganIndex = (startHourGanIndex + hourZhiIndex) % 10;
        return { gan: TIAN_GAN[ganIndex], zhi: DI_ZHI[hourZhiIndex] };
      }

      // ---------- 完整八字排盘 ----------
      function getBazi(year, month, day, hour, gender, isLunar) {

          } else {

        }

                  }

          var endMonth = season.end;

            var month2 = m2 > 12 ? m2 - 12 : m2;
            var year2 = m2 > 12 ? year + 1 : year;

                var lunar2 = solar2.getLunar();
                var dayGanZhi2 = lunar2.getDayInGanZhi();
                if (dayGanZhi2 && dayGanZhi2.length === 2) {

        var result = [];

                  jiShenList.push('与女方六合');

              result.push({

                reason: reason,

                dayZhi: dayZhi,
                avoidList: avoidList,
                score: score,
                jiShenList: jiShenList,
                sortKey: year * 10000 + monthNum * 100 + d
              });
            }
          }
        }

        result.sort(function(a, b) {
          if (b.score !== a.score) {
            return b.score - a.score;
          }
          return a.sortKey - b.sortKey;
        });

        return result;
      }

      // 获取天德合日
      function getTianDeDay(year, month) {
        var tianDeMap = {
          1: '丁', 2: '申', 3: '壬', 4: '辛', 5: '亥', 6: '甲',
          7: '癸', 8: '寅', 9: '丙', 10: '乙', 11: '巳', 12: '庚'
        };
        return tianDeMap[month] || '';
      }

      // 获取月德合日
      function getYueDeDay(month) {
        var yueDeMap = {
          1: '丙', 2: '甲', 3: '壬', 4: '庚', 5: '丙', 6: '甲',
          7: '壬', 8: '庚', 9: '丙', 10: '甲', 11: '壬', 12: '庚'
        };
        return yueDeMap[month] || '';
      }

      // 获取月份天数
      function getMonthDays(year, month) {
        return (month === 2) ? 28 : ((month === 4 || month === 6 || month === 9 || month === 11) ? 30 : 31);
      }

      // 检查是否为四离日
      function isSiLi(year, month, day) {
        var jieQiDates = getJieQiDates(year);
        var siLiDates = [];
        var keys = ['春分', '秋分', '夏至', '冬至'];
        for (var i = 0; i < keys.length; i++) {
          var date = jieQiDates[keys[i]];
          if (date) {
            var prevDay = new Date(date.year, date.month - 1, date.day - 1);
            siLiDates.push({ year: prevDay.getFullYear(), month: prevDay.getMonth() + 1, day: prevDay.getDate() });
          }
        }
        for (var j = 0; j < siLiDates.length; j++) {
          if (siLiDates[j].year === year && siLiDates[j].month === month && siLiDates[j].day === day) {
            return true;
          }
        }
        return false;
      }

      // 检查是否为四绝日
      function isSiJue(year, month, day) {
        var jieQiDates = getJieQiDates(year);
        var siJueDates = [];
        var keys = ['立春', '立夏', '立秋', '立冬'];
        for (var i = 0; i < keys.length; i++) {
          var date = jieQiDates[keys[i]];
          if (date) {
            var prevDay = new Date(date.year, date.month - 1, date.day - 1);
            siJueDates.push({ year: prevDay.getFullYear(), month: prevDay.getMonth() + 1, day: prevDay.getDate() });
          }
        }
        for (var j = 0; j < siJueDates.length; j++) {
          if (siJueDates[j].year === year && siJueDates[j].month === month && siJueDates[j].day === day) {
            return true;
          }
        }
        return false;
      }

      // 检查是否为杨公忌日
      function isYangGongJi(month, day) {
        var yangGongMap = {
          1: 13, 2: 11, 3: 9, 4: 7, 5: 5, 6: 3,
          7: 1, 8: 27, 9: 25, 10: 23, 11: 21, 12: 19
        };
        if (month === 7 && (day === 1 || day === 29)) return true;
        return yangGongMap[month] === day;
      }

      // 获取日支
      function getDayZhiByDate(year, month, day) {
        try {
          var solar = Solar.fromYmd(year, month, day);
          var lunar = solar.getLunar();
          var dayGanZhi = lunar.getDayInGanZhi();
          if (dayGanZhi && dayGanZhi.length === 2) {
            return dayGanZhi[1];
          }
        } catch (e) {}
        
        var baseUTC = Date.UTC(1900, 0, 1);
        var targetUTC = Date.UTC(year, month - 1, day);
        var diffDays = Math.floor((targetUTC - baseUTC) / 86400000);
        var baseZhiIndex = 10;
        var zhiIndex = ((baseZhiIndex + diffDays) % 12 + 12) % 12;
        return DI_ZHI[zhiIndex];
      }

        }

        html +=
          '<div style="margin-top:12px;padding:10px 14px;background:rgba(255,255,255,0.03);border-radius:12px;font-size:0.85rem;color:#8899bb;line-height:1.9;">' +
          '💒 择日依据：天德合日、月德合日、天赦日、三合六合等吉神，排除四离四绝、杨公忌日。<br>' +
          '✓ 吉日  ⚠️ 冲生肖日（建议避开）<br>' +
          '‼️ 冲犯新人  ⚡ 日支相冲  ⚠️ 犯三煞<br>' +
          '📌 注：此为专业简化版推算，建议结合专业择日师详勘。' +
          '</div>';

        extraPanel.innerHTML = html;
      }

      // ===== 月份折叠交互（事件委托） =====
      document.addEventListener('click', function(e) {
        var header = e.target.closest('.month-collapse-header');
        if (!header) return;
        var body = header.nextElementSibling;
        var arrow = header.querySelector('.collapse-arrow');
        if (body) {
          body.classList.toggle('open');
          if (arrow) {
            arrow.classList.toggle('open');
          }
        }
      });

      // ---------- 主计算 ----------
      function calculate() {
        if (!validateInputs()) {
          return;
        }

        loadingOverlay.classList.add('active');
        calcBtn.disabled = true;

        setTimeout(function() {
          try {
            var maleSurname = maleSurnameInput.value.trim();
            var maleGivenName = maleGivenNameInput.value.trim();
            var femaleSurname = femaleSurnameInput.value.trim();
            var femaleGivenName = femaleGivenNameInput.value.trim();

            var maleName = maleSurname + maleGivenName;
            var femaleName = femaleSurname + femaleGivenName;

            var maleCal = document.querySelector('input[name="maleCal"]:checked').value === 'lunar';
            var femaleCal = document.querySelector('input[name="femaleCal"]:checked').value === 'lunar';
            var mY = parseInt(maleYearInput.value) || 1990;
            var mM = parseInt(maleMonthInput.value) || 5;
            var mD = parseInt(maleDayInput.value) || 12;
            var mH = parseInt(maleHourInput.value) || 8;
            var fY = parseInt(femaleYearInput.value) || 1992;
            var fM = parseInt(femaleMonthInput.value) || 8;
            var fD = parseInt(femaleDayInput.value) || 20;
            var fH = parseInt(femaleHourInput.value) || 14;
            
            var maleGender = document.querySelector('input[name="maleGender"]:checked').value || 'male';
            var femaleGender = document.querySelector('input[name="femaleGender"]:checked').value || 'female';
            
            var maleBazi = getBazi(mY, mM, mD, mH, maleGender, maleCal);
            var femaleBazi = getBazi(fY, fM, fD, fH, femaleGender, femaleCal);

            var result = eightSteps(maleBazi, femaleBazi, mY, fY, maleName, femaleName, maleGender, femaleGender);
            renderSteps(result.steps, maleName, femaleName, result.grade);
            updateSummary(result.grade, maleName, femaleName);

            // 更新嫁娶择日
            updateWeddingPanel();

          } catch (e) {
            console.error('计算错误:', e);
            stepList.innerHTML =
              '<div class="step-item"><div class="step-content" style="color: #ff6b6b;">⚠️ 计算出现错误，请检查输入数据后重试。</div></div>';
          } finally {
            loadingOverlay.classList.remove('active');
            calcBtn.disabled = false;
          }
        }, 100);
      }

      function resetExample() {
        maleSurnameInput.value = '王';
        maleGivenNameInput.value = '林';
        femaleSurnameInput.value = '李';
        femaleGivenNameInput.value = '慕婉';
        maleYearInput.value = 1990;
        maleMonthInput.value = 5;
        maleDayInput.value = 12;
        maleHourInput.value = 8;
        femaleYearInput.value = 1992;
        femaleMonthInput.value = 8;
        femaleDayInput.value = 20;
        femaleHourInput.value = 14;
        document.querySelector('input[name="maleCal"][value="solar"]').checked = true;
        document.querySelector('input[name="femaleCal"][value="solar"]').checked = true;
        document.querySelector('input[name="maleGender"][value="male"]').checked = true;
        document.querySelector('input[name="femaleGender"][value="female"]').checked = true;
        document.getElementById('maleHourLabel').textContent = getShiChen(8);
        document.getElementById('femaleHourLabel').textContent = getShiChen(14);
        document.querySelectorAll('.input-error').forEach(function(el) { el.textContent = ''; });
        document.querySelectorAll('.error').forEach(function(el) { el.classList.remove('error'); });
        calculate();
      }

      // 绑定事件
      calcBtn.addEventListener('click', calculate);
      resetBtn.addEventListener('click', resetExample);

      window.addEventListener('load', function() {
        bindHourTranslation();
        calculate();
      });
    })();
  </script>
</body>
</html>
