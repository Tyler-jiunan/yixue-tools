<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>八字合婚 · 八步演算</title>
  <!-- 引入 lunar-javascript 农历库 -->
  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.6.12/lunar.min.js">
  </script>
  <!-- 引入 chinese-stroke 汉字笔画库 -->
  <script src="https://cdn.jsdelivr.net/npm/chinese-stroke@1.0.0/dist/chinese-stroke.min.js">
  </script>
  <style>
    /* ============================================================
    第1块：全局重置 & 基础样式
    作用：清除浏览器默认边距，设置 body 背景渐变、字体
    ============================================================ */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      /* 深空蓝紫渐变，营造深邃星空感 */
      background: linear-gradient(145deg, #0b0e1a 0%, #1a1f35 40%, #0d1b2a 100%);
      font-family: 'Segoe UI', '华文楷体', 'KaiTi', 'Microsoft YaHei', serif;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #c8d0e0;
    }
    .container {
      max-width: 1000px;
      width: 100%;
      /* 毛玻璃效果卡片 */
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      border-radius: 32px;
      padding: 28px 24px 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: 6px;
      text-align: center;
      border-bottom: 2px dashed rgba(255, 255, 255, 0.08);
      padding-bottom: 16px;
      margin-bottom: 24px;
      color: #e8edf5;
      text-shadow: 0 0 40px rgba(60, 120, 255, 0.10);
    }
    h1 small {
      font-size: 0.9rem;
      letter-spacing: 2px;
      color: #8899bb;
      display: block;
      margin-top: 6px;
      font-weight: 300;
    }
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 24px;
      background: rgba(255, 255, 255, 0.04);
      padding: 20px 18px;
      border-radius: 28px;
      margin-bottom: 28px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .input-group label {
      font-size: 0.95rem;
      font-weight: 500;
      color: #aabbdd;
      letter-spacing: 1px;
      margin-left: 6px;
    }
    .input-group input {
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.05);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: 0.2s;
      color: #e8edf5;
      min-width: 0;
      width: 100%;
    }
    .input-group input:focus {
      border-color: rgba(100, 180, 255, 0.4);
      box-shadow: 0 0 0 3px rgba(60, 120, 255, 0.15);
    }
    .input-group input::placeholder {
      color: #556688;
    }
    .input-group input[type="number"] {
      -moz-appearance: textfield;
    }
    .input-group input[type="number"]::-webkit-outer-spin-button,
    .input-group input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }
    .input-group input.error {
      border-color: rgba(255, 80, 80, 0.5);
      box-shadow: 0 0 0 3px rgba(255, 80, 80, 0.15);
    }
    .input-error {
      color: #ff6b6b;
      font-size: 0.78rem;
      margin-left: 10px;
      margin-top: 2px;
      min-height: 18px;
    }
    /* 姓名双栏布局 - 标签在输入框前面 */
    .name-row {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .name-row .name-label {
      font-size: 0.85rem;
      color: #8899bb;
      white-space: nowrap;
      font-weight: 500;
      letter-spacing: 0.5px;
      min-width: 20px;
    }
    .name-row .name-input-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
      min-width: 60px;
    }
    .name-row .name-input-wrap input {
      flex: 1;
      min-width: 40px;
      padding: 8px 10px;
    }
    .name-row .name-input-wrap .label-inline {
      font-size: 0.75rem;
      color: #556688;
      background: rgba(255, 255, 255, 0.05);
      padding: 2px 8px;
      border-radius: 12px;
      white-space: nowrap;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .gender-group {
      display: flex;
      gap: 18px;
      align-items: center;
      margin-top: 4px;
      padding-left: 6px;
      flex-wrap: wrap;
    }
    .gender-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 400;
      font-size: 0.95rem;
      cursor: pointer;
      color: #aabbdd;
    }
    .gender-group input[type="radio"] {
      width: 18px;
      height: 18px;
      accent-color: #4A90E2;
    }
    .calendar-toggle {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 6px;
      margin-left: 6px;
      flex-wrap: wrap;
    }
    .calendar-toggle label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 400;
      font-size: 0.9rem;
      cursor: pointer;
      color: #aabbdd;
    }
    .calendar-toggle input[type="radio"] {
      width: 16px;
      height: 16px;
      accent-color: #4A90E2;
    }
    .date-row {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      align-items: center;
    }
    .date-row input {
      flex: 1 1 0;
      min-width: 42px;
      padding: 8px 6px;
      font-size: 0.92rem;
    }
    .date-row .hour-label {
      font-size: 0.85rem;
      color: #8899bb;
      background: rgba(255, 255, 255, 0.06);
      padding: 4px 10px;
      border-radius: 30px;
      white-space: nowrap;
      margin-left: 2px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .action-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      margin: 24px 0 20px;
    }
    .btn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.10);
      padding: 12px 36px;
      border-radius: 60px;
      font-size: 1.15rem;
      font-weight: 500;
      color: #c8d0e0;
      letter-spacing: 2px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.2);
      font-family: inherit;
      flex: 1 1 0;
      min-width: 180px;
      max-width: 260px;
      white-space: nowrap;
    }
    .btn-primary {
      background: rgba(60, 120, 255, 0.20);
      color: #8ab4ff;
      box-shadow: 0 4px 0 rgba(30, 80, 200, 0.3);
      border-color: rgba(60, 120, 255, 0.25);
    }
    .btn-primary:hover {
      background: rgba(60, 120, 255, 0.30);
      transform: translateY(-2px);
      box-shadow: 0 6px 0 rgba(30, 80, 200, 0.4);
      border-color: rgba(60, 120, 255, 0.4);
    }
    .btn-primary:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 rgba(30, 80, 200, 0.3);
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.2);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }
    .steps-container {
      margin: 28px 0 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 28px;
      padding: 8px 8px 8px 8px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .step-item {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 40px;
      padding: 16px 20px;
      margin-bottom: 10px;
      border-left: 6px solid rgba(60, 120, 255, 0.3);
      transition: 0.15s;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
    }
    .step-item:last-child {
      margin-bottom: 0;
    }
    .step-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .step-num {
      background: rgba(60, 120, 255, 0.25);
      color: #8ab4ff;
      border-radius: 40px;
      padding: 0 16px;
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 28px;
      letter-spacing: 1px;
    }
    .step-title {
      font-weight: 600;
      font-size: 1.2rem;
      color: #e8edf5;
    }
    .step-badge {
      font-size: 0.75rem;
      background: rgba(255, 255, 255, 0.06);
      padding: 2px 14px;
      border-radius: 30px;
      color: #8899bb;
      margin-left: 4px;
    }
    .step-content {
      margin-top: 10px;
      font-size: 0.98rem;
      line-height: 1.8;
      color: #c8d0e0;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 24px;
      padding: 12px 18px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }
    .step-content .label {
      font-weight: 600;
      color: #8ab4ff;
    }
    .step-content .value {
      color: #c8d0e0;
    }
    .result-summary {
      margin-top: 24px;
      padding: 18px 22px;
      background: rgba(60, 120, 255, 0.10);
      border-radius: 60px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: 500;
      letter-spacing: 2px;
      border: 1px solid rgba(60, 120, 255, 0.15);
      color: #8ab4ff;
    }
    /* ---- 多功能合婚栏 ---- */
    .extra-marriage-section {
      margin-top: 20px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 28px;
      padding: 16px 18px 18px 18px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .extra-marriage-section .extra-tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .extra-marriage-section .extra-tabs .btn-extra {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 8px 28px;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 500;
      color: #8899bb;
      letter-spacing: 1px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.15);
      font-family: inherit;
      flex: 0 1 auto;
    }
    .extra-marriage-section .extra-tabs .btn-extra:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-1px);
    }
    .extra-marriage-section .extra-tabs .btn-extra.active {
      background: rgba(60, 120, 255, 0.20);
      color: #8ab4ff;
      border-color: rgba(60, 120, 255, 0.25);
      box-shadow: 0 2px 0 rgba(30, 80, 200, 0.3);
    }
    .extra-marriage-section .extra-panel {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 24px;
      padding: 2px 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.98rem;
      line-height: 1.8;
      color: #c8d0e0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      min-height: auto;
    }
    .extra-marriage-section .extra-panel .label {
      font-weight: 600;  
      color: #8ab4ff;
    }
    /* 月份折叠样式 */
    .month-collapse {
      margin-bottom: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      overflow: hidden;
    }
    .month-collapse-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.04);
      cursor: pointer;
      transition: 0.2s;
      user-select: none;
      border-radius: 12px;
    }
    .month-collapse-header:hover {
      background: rgba(255, 255, 255, 0.08);
    }
    .month-collapse-header .month-name {
      font-weight: 600;
      font-size: 1rem;
      color: #e8edf5;
    }
    .month-collapse-header .month-badge {
      font-size: 0.75rem;
      color: #8899bb;
      background: rgba(255, 255, 255, 0.06);
      padding: 2px 12px;
      border-radius: 20px;
    }
    .month-collapse-header .collapse-arrow {
      font-size: 0.8rem;
      color: #8899bb;
      transition: transform 0.25s ease;
    }
    .month-collapse-header .collapse-arrow.open {
      transform: rotate(180deg);
    }
    .month-collapse-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
      padding: 0 6px;
    }
    .month-collapse-body.open {
      max-height: 3000px;
      padding: 10px 6px;
    }
    .month-collapse-body .day-item {
      padding: 3px 6px;
      font-size: 0.9rem;
      line-height: 1.9;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      color: #c8d0e0;
    }
    .month-collapse-body .day-item:last-child {
      border-bottom: none;
    }
    .month-collapse-body .day-item .flag-good {
      color: #66bb6a;
    }
    .month-collapse-body .day-item .flag-bad {
      color: #ff6b6b;
    }
    .month-collapse-body .day-item .avoid-info {
      color: #8899bb;
      font-size: 0.82rem;
    }
    .month-collapse-body .day-item .score-badge {
      font-size: 0.7rem;
      background: rgba(60, 120, 255, 0.15);
      color: #8ab4ff;
      padding: 0 8px;
      border-radius: 12px;
      margin-left: 4px;
    }
    .wedding-summary-line {
      margin-bottom: 12px;
      font-size: 0.92rem;
      color: #aabbdd;
      text-align: center;
    }
    .footnote {
      margin-top: 20px;
      text-align: center;
      font-size: 0.8rem;
      color: #556688;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding-top: 16px;
      flex-shrink: 0;
    }
    /* 加载提示 */
    .loading-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(11, 14, 26, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
    }
    .loading-overlay.active {
      display: flex;
    }
    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(60, 120, 255, 0.15);
      border-top-color: #8ab4ff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      color: #8ab4ff;
      font-size: 1.1rem;
      letter-spacing: 3px;
    }
    /* 响应式 */
    @media (max-width: 820px) {
      .input-grid {
        grid-template-columns: 1fr 1fr;
        gap: 12px 16px;
        padding: 16px 14px;
      }
      .container {
        padding: 20px 16px;
      }
      .date-row input {
        min-width: 36px;
        font-size: 0.85rem;
        padding: 6px 4px;
      }
      .date-row .hour-label {
        font-size: 0.78rem;
        padding: 3px 8px;
      }
      .btn {
        min-width: 140px;
        max-width: 100%;
        flex: 1 1 100%;
        white-space: normal;
        padding: 10px 20px;
        font-size: 1rem;
      }
      .name-row .name-input-wrap input {
        padding: 6px 8px;
        font-size: 0.9rem;
      }
      .name-row .name-label {
        font-size: 0.78rem;
      }
    }
    @media (max-width: 640px) {
      .input-grid {
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 14px 12px;
      }
      .container {
        padding: 16px 12px;
      }
      .step-item {
        padding: 14px 14px;
      }
      .extra-marriage-section .extra-tabs .btn-extra {
        flex: 1 1 100%;
        text-align: center;
      }
      .name-row {
        flex-wrap: nowrap;
      }
      .name-row .name-input-wrap {
        min-width: 50px;
      }
      .name-row .name-input-wrap input {
        min-width: 30px;
        font-size: 0.85rem;
        padding: 6px 6px;
      }
      .date-row input {
        min-width: 32px;
        font-size: 0.8rem;
        padding: 5px 3px;
      }
      .date-row .hour-label {
        font-size: 0.72rem;
        padding: 2px 6px;
      }
      .calendar-toggle {
        gap: 8px;
      }
      .calendar-toggle label {
        font-size: 0.8rem;
      }
      .gender-group {
        gap: 12px;
      }
      .gender-group label {
        font-size: 0.85rem;
      }
      .month-collapse-header {
        padding: 6px 10px;
      }
      .month-collapse-header .month-name {
        font-size: 0.9rem;
      }
      .month-collapse-body .day-item {
        font-size: 0.82rem;
        padding: 2px 4px;
      }
    }
  </style>
</head>
<body>
  <!-- 加载遮罩 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">🔮 天机演算中 ...</div>
  </div>

  <div class="container" id="app">
    <h1>⚛️ 八字合婚 <small>八步演算 · 天作之合</small></h1>

    <!-- 输入区 -->
    <div class="input-grid">
      <!-- 男方姓名 -->
      <div class="input-group">
        <label>👤 男方姓名</label>
        <div class="name-row">
          <span class="name-label">姓</span>
          <div class="name-input-wrap">
            <input type="text" id="maleSurname" value="王" placeholder="姓" maxlength="2">
          </div>
          <span class="name-label">名</span>
          <div class="name-input-wrap">
            <input type="text" id="maleGivenName" value="林" placeholder="名" maxlength="4">
          </div>
        </div>
        <div class="input-error" id="maleNameError"></div>
      </div>

      <!-- 女方姓名 -->
      <div class="input-group">
        <label>👩 女方姓名</label>
        <div class="name-row">
          <span class="name-label">姓</span>
          <div class="name-input-wrap">
            <input type="text" id="femaleSurname" value="李" placeholder="姓" maxlength="2">
          </div>
          <span class="name-label">名</span>
          <div class="name-input-wrap">
            <input type="text" id="femaleGivenName" value="慕婉" placeholder="名" maxlength="4">
          </div>
        </div>
        <div class="input-error" id="femaleNameError"></div>
      </div>

      <!-- 男方出生 -->
      <div class="input-group">
        <label>📅 男方出生</label>
        <div class="calendar-toggle">
          <label><input type="radio" name="maleCal" value="solar" checked> 公历</label>
          <label><input type="radio" name="maleCal" value="lunar"> 农历</label>
        </div>
        <div class="date-row">
          <input type="number" id="maleYear" value="1990" placeholder="年" style="flex:2;" min="1900" max="2100" maxlength="4" oninput="if(this.value.length>4) this.value=this.value.slice(0,4)">
          <input type="number" id="maleMonth" value="5" placeholder="月" style="flex:1;" min="1" max="12" maxlength="2" oninput="if(this.value.length>2) this.value=this.value.slice(0,2)">
          <input type="number" id="maleDay" value="12" placeholder="日" style="flex:1;" min="1" max="31" maxlength="2" oninput="if(this.value.length>2) this.value=this.value.slice(0,2)">
          <input type="number" id="maleHour" value="8" placeholder="时" style="flex:1;" min="0" max="23" maxlength="2" oninput="if(this.value.length>2) this.value=this.value.slice(0,2)">
          <span class="hour-label" id="maleHourLabel">辰时</span>
        </div>
        <div class="input-error" id="maleDateError"></div>
      </div>

      <!-- 女方出生 -->
      <div class="input-group">
        <label>📅 女方出生</label>
        <div class="calendar-toggle">
          <label><input type="radio" name="femaleCal" value="solar" checked> 公历</label>
          <label><input type="radio" name="femaleCal" value="lunar"> 农历</label>
        </div>
        <div class="date-row">
          <input type="number" id="femaleYear" value="1992" placeholder="年" style="flex:2;" min="1900" max="2100" maxlength="4" oninput="if(this.value.length>4) this.value=this.value.slice(0,4)">
          <input type="number" id="femaleMonth" value="8" placeholder="月" style="flex:1;" min="1" max="12" maxlength="2" oninput="if(this.value.length>2) this.value=this.value.slice(0,2)">
          <input type="number" id="femaleDay" value="20" placeholder="日" style="flex:1;" min="1" max="31" maxlength="2" oninput="if(this.value.length>2) this.value=this.value.slice(0,2)">

      // ---------- 年柱排盘 (基于立春) ----------
      function getYearGanZhi(solarYear, solarMonth, solarDay) {

          var lunar = solar.getLunar();

            year = solarYear - 1;
          }
        }
        var gan = TIAN_GAN[(year - 4) % 10];
        var zhi = DI_ZHI[(year - 4) % 12];
        return { gan: gan, zhi: zhi, year: year };
      }

      // ========== 【修复3】月柱排盘 - 重构节气逻辑 ==========

          { month: 3, day: 6, zhi: '卯' },   // 惊蛰 - 二月

          { month: 9, day: 8, zhi: '酉' },   // 白露 - 八月
          { month: 10, day: 8, zhi: '戌' },  // 寒露 - 九月
          { month: 11, day: 7, zhi: '亥' },  // 立冬 - 十月
          { month: 12, day: 7, zhi: '子' },  // 大雪 - 冬月
          { month: 1, day: 6, zhi: '丑' }    // 小寒 - 腊月（跨年，用于次年的判断）
        ];

        var zhi = '寅'; // 默认值

        // 先处理立春前的特殊情况：2月4日之前属于"丑月"（上一年的十二月）
        if (solarMonth === 1 || (solarMonth === 2 && solarDay < 4)) {
          zhi = '丑';
        } else {
          // 从后往前遍历，找到第一个符合的节气

            var d = jq.day;
            
            // 处理跨年情况：小寒(1月6日)用于确定腊月
            // 对于1月6日之前，仍在上一年的冬月(子月)
            // 但我们已经在上面的if中处理了1月，所以这里主要处理2月及以后
            if (solarMonth > m || (solarMonth === m && solarDay >= d)) {
              zhi = jq.zhi;
              break;
            }
          }
        }

        // 五鼠遁：根据年干确定正月(寅月)的天干
        var yearGanIndex = TIAN_GAN.indexOf(yearGan);
        var startIndex = (yearGanIndex * 2 + 2) % 10; // 寅月天干起始
        var zhiIndex = DI_ZHI.indexOf(zhi);
        // 计算当前地支相对寅月的偏移（寅=2，子=0，丑=1，卯=3...）
        var monthZhiOffset = (zhiIndex - 2 + 12) % 12;
        var ganIndex = (startIndex + monthZhiOffset) % 10;
        var gan = TIAN_GAN[ganIndex];
        
        return { gan: gan, zhi: zhi };
      }

      // ---------- 日柱排盘 (使用lunar-javascript库) ----------
      function getDayGanZhi(solarYear, solarMonth, solarDay) {
          try {

              var lunar = solar.getLunar();
              var dayGanZhi = lunar.getDayInGanZhi();
              if (dayGanZhi && dayGanZhi.length === 2) {

          } catch (e) {
              // 库调用失败，使用降级算法
          }
          
          // 降级算法：使用 Date.UTC 计算天数差
          var baseUTC = Date.UTC(1900, 0, 1);
          var targetUTC = Date.UTC(solarYear, solarMonth - 1, solarDay);
          var diffDays = Math.floor((targetUTC - baseUTC) / 86400000);
          
          // 计算天干（甲=0, 乙=1, ..., 癸=9）
          var ganIndex = ((diffDays % 10) + 10) % 10;
          // 计算地支（子=0, 丑=1, ..., 亥=11）
          var zhiIndex = ((diffDays % 12) + 12) % 12;
          
          return [TIAN_GAN[ganIndex], DI_ZHI[zhiIndex]];
      }

      // ---------- 时柱排盘 (五鼠遁) ----------
      function getHourGanZhi(dayGan, hour) {
        var dayGanIndex = TIAN_GAN.indexOf(dayGan);
        var startHourGanIndex = (dayGanIndex % 5) * 2;
        var hourZhiIndex = Math.floor((hour + 1) / 2) % 12;
        var ganIndex = (startHourGanIndex + hourZhiIndex) % 10;
        return { gan: TIAN_GAN[ganIndex], zhi: DI_ZHI[hourZhiIndex] };
      }

      function getBazi(year, month, day, hour, gender, isLunar) {
        var solarYear = year,

          solarDay = day;

          var solar = lunarToSolar(year, month, day);

            solarYear = solar.year;
            solarMonth = solar.month;
            solarDay = solar.day;
          } else {
            solarYear = year;
            solarMonth = month + 1;
            solarDay = day + 2;
          }
        }
        var yearResult = getYearGanZhi(solarYear, solarMonth, solarDay);
        var yearGan = yearResult.gan;
        var yearZhi = yearResult.zhi;
        var monthResult = getMonthGanZhi(solarYear, solarMonth, solarDay, yearGan);
        var dayResult = getDayGanZhi(solarYear, solarMonth, solarDay);
        var dayGan = dayResult[0];
        var dayZhi = dayResult[1];
        var hourResult = getHourGanZhi(dayGan, hour);
        return {
          year: [yearGan, yearZhi],
          month: [monthResult.gan, monthResult.zhi],
          day: [dayGan, dayZhi],
          hour: [hourResult.gan, hourResult.zhi],
          solarDate: { year: solarYear, month: solarMonth, day: solarDay },

      // ========== 【修复2】大运起运 - 修正地支行运方向 ==========
	  // ========== 辅助函数：UTC日期加减天数 ==========
      function addDaysToUTC(year, month, day, days) {
          var utcTime = Date.UTC(year, month - 1, day);
          var newTime = utcTime + days * 86400000;
          var date = new Date(newTime);

      function getCharStroke(char) {
        var stroke = 0;

          if (stroke < 1) stroke = 1;
          if (stroke > 30) stroke = 30;
          return stroke;
        }
        return 5;

      function isSiJue(year, month, day) {
        var jieQiDates = getJieQiDates(year);
        var siJueDates = [];
        var keys = ['立春', '立夏', '立秋', '立冬'];
        for (var i = 0; i < keys.length; i++) {
          var date = jieQiDates[keys[i]];
          if (date) {
            var prevDay = new Date(date.year, date.month - 1, date.day - 1);
            siJueDates.push({ year: prevDay.getFullYear(), month: prevDay.getMonth() + 1, day: prevDay.getDate() });
          }
        }
        for (var j = 0; j < siJueDates.length; j++) {
          if (siJueDates[j].year === year && siJueDates[j].month === month && siJueDates[j].day === day) {
            return true;
          }
        }
        return false;
      }

      // 检查是否为杨公忌日
      function isYangGongJi(month, day) {
        var yangGongMap = {
          1: 13, 2: 11, 3: 9, 4: 7, 5: 5, 6: 3,
          7: 1, 8: 27, 9: 25, 10: 23, 11: 21, 12: 19
        };
        if (month === 7 && (day === 1 || day === 29)) return true;
        return yangGongMap[month] === day;
      }

      function getDayZhiByDate(year, month, day) {
        try {
          var solar = Solar.fromYmd(year, month, day);
          var lunar = solar.getLunar();
          var dayGanZhi = lunar.getDayInGanZhi();
          if (dayGanZhi && dayGanZhi.length === 2) {
            return dayGanZhi[1];
          }
        } catch (e) { /* 忽略 */ }
        var monthCode = [0, 3, 3, 6, 1, 4, 6, 2, 5, 0, 3, 5];
        var y = year,
          m = month,
          d = day;
        if (m < 3) { y--;
          m += 12; }
        var yearCode = (y + Math.floor(y / 4) + Math.floor(y / 400) - Math.floor(y / 100) + 1) % 60;
        var monthCodeVal = monthCode[month - 1] || 0;
        var dayOffset = (yearCode + monthCodeVal + d) % 60;
        var zhiIndex = dayOffset % 12;
        return DI_ZHI[zhiIndex];
      }

          '亥': ['申', '酉', '戌'], '卯': ['申', '酉', '戌'], '未': ['申', '酉', '戌'],
          '巳': ['寅', '卯', '辰'], '酉': ['寅', '卯', '辰'], '丑': ['寅', '卯', '辰']
        };
        var sanShaList = sanShaMap[dayZhi] || [];
        for (var i = 0; i < sanShaList.length; i++) {
          avoidList.push({ type: '三煞', shengxiao: sanShaList[i], desc: '犯三煞' });
        }
        var chongMap3 = {
          '鼠': '午', '牛': '未', '虎': '申', '兔': '酉', '龙': '戌', '蛇': '亥',
          '马': '子', '羊': '丑', '猴': '寅', '鸡': '卯', '狗': '辰', '猪': '巳'
        };
        var maleChongZhi = chongMap3[maleSX] || '';
        var femaleChongZhi = chongMap3[femaleSX] || '';
        if (dayZhi === maleChongZhi) {
          avoidList.push({ type: '冲犯新人', shengxiao: maleSX, desc: '冲犯新郎生肖' });
        }
        if (dayZhi === femaleChongZhi) {
          avoidList.push({ type: '冲犯新人', shengxiao: femaleSX, desc: '冲犯新娘生肖' });
        }
        var unique = {};
        for (var j = 0; j < avoidList.length; j++) {
          var item = avoidList[j];
          var key = item.shengxiao;
          if (!unique[key] || item.type === '冲犯新人') {
            unique[key] = item;
          }
        }
        var result = [];
        for (var key2 in unique) {
          result.push(unique[key2]);
        }
        var priority = { '冲犯新人': 0, '相冲': 1, '三煞': 2 };
        result.sort(function(a, b) {
          return (priority[a.type] || 3) - (priority[b.type] || 3);
        });
        return result;
      }

      // ===== 专业择日主函数 =====
      function getWeddingDatesProfessional(year, maleSX, femaleSX) {
        var months = ['正月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '冬月', '腊月'];

        var chongMap = {
          '鼠': '午', '牛': '未', '虎': '申', '兔': '酉', '龙': '戌', '蛇': '亥',
          '马': '子', '羊': '丑', '猴': '寅', '鸡': '卯', '狗': '辰', '猪': '巳'
        };
        var maleChong = chongMap[maleSX] || '';
        var femaleChong = chongMap[femaleSX] || '';
        var chongSet = {};
        if (maleChong) chongSet[maleChong] = true;
        if (femaleChong) chongSet[femaleChong] = true;

        // 获取天赦日
        var tianSheDays = [];
        var seasons = [
          { start: 2, end: 4, gan: '戊', zhi: '寅' },
          { start: 5, end: 7, gan: '甲', zhi: '午' },
          { start: 8, end: 10, gan: '戊', zhi: '申' },
          { start: 11, end: 13, gan: '甲', zhi: '子' }
        ];
        for (var s = 0; s < seasons.length; s++) {
          var season = seasons[s];
          var startMonth = season.start;
          var endMonth = season.end;
          for (var m2 = startMonth; m2 <= endMonth; m2++) {
            var month2 = m2 > 12 ? m2 - 12 : m2;
            var year2 = m2 > 12 ? year + 1 : year;
            var maxDay2 = getMonthDays(year2, month2);
            for (var d2 = 1; d2 <= maxDay2; d2++) {
              try {
                var solar2 = Solar.fromYmd(year2, month2, d2);
                var lunar2 = solar2.getLunar();
                var dayGanZhi2 = lunar2.getDayInGanZhi();
                if (dayGanZhi2 && dayGanZhi2.length === 2) {
                  if (dayGanZhi2[0] === season.gan && dayGanZhi2[1] === season.zhi) {
                    tianSheDays.push({ year: year2, month: month2, day: d2 });
                  }
                }
              } catch (e) { /* 忽略 */ }
            }
          }
        }
        var tianSheSet = {};
        for (var ts = 0; ts < tianSheDays.length; ts++) {
          var tsd = tianSheDays[ts];
          tianSheSet[tsd.year + '-' + tsd.month + '-' + tsd.day] = true;
        }

        // 三合组 - 简化为4组
        var sanHeGroups = [
          ['鼠', '龙', '猴'], ['牛', '蛇', '鸡'], ['虎', '马', '狗'], ['兔', '羊', '猪']
        ];
        var liuHeMap = {
          '鼠': '牛', '牛': '鼠', '虎': '猪', '猪': '虎',
          '兔': '狗', '狗': '兔', '龙': '鸡', '鸡': '龙',
          '蛇': '猴', '猴': '蛇', '马': '羊', '羊': '马'
        };

        var result = [];

        // 遍历全年每一天
        for (var m = 0; m < 12; m++) {
          var monthNum = m + 1;
          var maxDay = getMonthDays(year, monthNum);

          for (var d = 1; d <= maxDay; d++) {
            // 1. 检查四离四绝（跳过）
            if (isSiLi(year, monthNum, d) || isSiJue(year, monthNum, d)) {
              continue;
            }
            // 2. 检查杨公忌日（跳过）
            if (isYangGongJi(monthNum, d)) {
              continue;
            }
            // 3. 获取日支
            var dayZhi = getDayZhiByDate(year, monthNum, d);
            if (!dayZhi) continue;
            // 4. 检查冲生肖
            var isChong = chongSet[dayZhi] || false;

            // 5. 计算吉神得分
            var score = 0;
            var jiShenList = [];

            // 天德合日 +2
            var tianDe = getTianDeDay(year, monthNum);
            try {
              var solar = Solar.fromYmd(year, monthNum, d);
              var lunar = solar.getLunar();
              var dayGanZhi = lunar.getDayInGanZhi();
              if (dayGanZhi && dayGanZhi.length === 2) {
                if (dayGanZhi[0] === tianDe) {
                  score += 2;
                  jiShenList.push('天德合日');
                }
              }
            } catch (e) { /* 忽略 */ }

            // 月德合日 +2
            var yueDe = getYueDeDay(monthNum);
            try {
              var solar2 = Solar.fromYmd(year, monthNum, d);
              var lunar2 = solar2.getLunar();
              var dayGanZhi2 = lunar2.getDayInGanZhi();
              if (dayGanZhi2 && dayGanZhi2.length === 2) {
                if (dayGanZhi2[0] === yueDe) {
                  score += 2;
                  jiShenList.push('月德合日');
                }
              }
            } catch (e) { /* 忽略 */ }

            // 天赦日 +3
            var key = year + '-' + monthNum + '-' + d;
            if (tianSheSet[key]) {
              score += 3;
              jiShenList.push('天赦日');
            }

            // 与新人生肖三合 +2
            var daySX = getShengXiaoByZhi(dayZhi);
            if (daySX) {
              // 检查是否与男方或女方在同一三合组
              var maleInGroup = false;
              var femaleInGroup = false;
              for (var sg = 0; sg < sanHeGroups.length; sg++) {
                var group = sanHeGroups[sg];
                if (group.indexOf(maleSX) !== -1 && group.indexOf(daySX) !== -1) {
                  maleInGroup = true;
                }
                if (group.indexOf(femaleSX) !== -1 && group.indexOf(daySX) !== -1) {
                  femaleInGroup = true;
                }
              }
              if (maleInGroup) {
                var alreadyHas = false;
                for (var jl = 0; jl < jiShenList.length; jl++) {
                  if (jiShenList[jl] === '与男方三合') alreadyHas = true;
                }
                if (!alreadyHas) {
                  score += 2;
                  jiShenList.push('与男方三合');
                }
              }
              if (femaleInGroup) {
                var alreadyHas2 = false;
                for (var jl2 = 0; jl2 < jiShenList.length; jl2++) {
                  if (jiShenList[jl2] === '与女方三合') alreadyHas2 = true;
                }
                if (!alreadyHas2) {
                  score += 2;
                  jiShenList.push('与女方三合');
                }
              }
            }

            // 与新人生肖六合 +3
            if (daySX) {
              if (liuHeMap[maleSX] === daySX) {
                var alreadyHas3 = false;
                for (var jl3 = 0; jl3 < jiShenList.length; jl3++) {
                  if (jiShenList[jl3] === '与男方六合') alreadyHas3 = true;
                }
                if (!alreadyHas3) {
                  score += 3;
                  jiShenList.push('与男方六合');
                }
              }
              if (liuHeMap[femaleSX] === daySX) {
                var alreadyHas4 = false;
                for (var jl4 = 0; jl4 < jiShenList.length; jl4++) {
                  if (jiShenList[jl4] === '与女方六合') alreadyHas4 = true;
                }
                if (!alreadyHas4) {
                  score += 3;
                  jiShenList.push('与女方六合');
                }
              }
            }

            // 冲日扣分
            if (isChong) {
              score -= 2;
            }

            // 只保留得分 >= 4 的日期
            if (score >= 4) {
              var avoidList = getAvoidShengXiao(dayZhi, maleSX, femaleSX);

              var reason = '婚嫁吉日';
              if (jiShenList.length > 0) {
                reason = jiShenList.join('、');
              }
              if (isChong) {
                reason += ' ⚠️冲生肖';
              }

              result.push({
                month: months[m],
                monthNum: monthNum,
                day: d,
                date: year + '年' + monthNum + '月' + d + '日',
                reason: reason,
                isChong: isChong,
                dayZhi: dayZhi,
                avoidList: avoidList,
                score: score,
                jiShenList: jiShenList,
                sortKey: year * 10000 + monthNum * 100 + d
              });
            }
          }
        }

        // 按得分降序排序，得分相同按日期升序
        result.sort(function(a, b) {
          if (b.score !== a.score) {
            return b.score - a.score;
          }
          return a.sortKey - b.sortKey;
        });

        return result;
      }

          score: 7
        });

        // 6. 大运配合（修复：传入月柱地支）
        var maleDaYun = getDaYun(maleBA.year[0], 'male', maleBA.solarDate.year, maleBA.solarDate.month, maleBA.solarDate.day, maleBA.month[1]);
        var femaleDaYun = getDaYun(femaleBA.year[0], 'female', femaleBA.solarDate.year, femaleBA.solarDate.month, femaleBA.solarDate.day, femaleBA.month[1]);
        var daYunSync = Math.abs(maleDaYun.startAge - femaleDaYun.startAge) <= 2;
        var step6Score = daYunSync ? 8 : 5;
        steps.push({
          title: '第六步 · 大运配合',
          content: '【男方大运】: ' + maleDaYun.list.join(' → ') + ' (起运: ' + maleDaYun.startAge + '岁)\n【女方大运】: ' +

              '大运同步，运势相合。' : '大运略有差异，需相互体谅。'),
          score: step6Score
        });

        // 7. 五行互补 (动态评分)
        var wuXingResult = getWuXingBuJi(maleBA, femaleBA);
        var wuXingMatch = wuXingResult.match(/木: (\d+), 火: (\d+), 土: (\d+), 金: (\d+), 水: (\d+)/);
        var step7Score = 6;
        if (wuXingMatch) {
          var wood = parseInt(wuXingMatch[1]);
          var fire = parseInt(wuXingMatch[2]);
          var earth = parseInt(wuXingMatch[3]);
          var metal = parseInt(wuXingMatch[4]);
          var water = parseInt(wuXingMatch[5]);
          var values = [wood, fire, earth, metal, water];
          var totalCount = wood + fire + earth + metal + water;
          var maxVal = Math.max.apply(null, values);
          var minVal = Math.min.apply(null, values);
          var range = maxVal - minVal;
          if (range <= 1) step7Score = 9;
          else if (range <= 3) step7Score = 8;
          else if (range <= 5) step7Score = 7;
          else if (range <= 8) step7Score = 6;
          else if (range <= 12) step7Score = 5;
          else step7Score = 4;
          if (totalCount < 10) step7Score = Math.max(step7Score - 1, 3);
        }
        steps.push({
          title: '第七步 · 五行互补',
          content: '【八字五行分布】: ' + wuXingResult + '\n【综合小结】: 五行均衡，互补为佳。',
          score: step7Score
        });

        // 8. 综合判吉 (加权评分)
        var totalScore = steps.reduce(function(sum, s) { return sum + s.score; }, 0);
        var avgScore = totalScore / steps.length;
        var finalScore = Math.round(avgScore);
        var grade = finalScore >= 7 ? '上等婚 · 天作之合' : (finalScore >= 5 ? '中等婚 · 相敬如宾' : '下等婚 · 需磨合');
        steps.push({

          score: finalScore
        });

        return { steps: steps, grade: grade, score: finalScore };
      }

            var fH = parseInt(femaleHourInput.value) || 14;
            // 【修复1】性别传入修正：固定男为male，女为female
            var maleBazi = getBazi(mY, mM, mD, mH, 'male', maleCal);
            var femaleBazi = getBazi(fY, fM, fD, fH, 'female', femaleCal);

            var result = eightSteps(maleBazi, femaleBazi, mY, fY, maleName, femaleName, 'male');
            renderSteps(result.steps, maleName, femaleName, result.grade);
            updateSummary(result.grade, maleName, femaleName);

            var activeTab = document.querySelector('.extra-tabs .btn-extra.active');
            var tab = activeTab ? activeTab.dataset.target : 'zodiac';
            var maleSolarMonth = mM,
              maleSolarDay = mD,
              femaleSolarMonth = fM,
              femaleSolarDay = fD;
            if (maleCal) {
              var s = lunarToSolar(mY, mM, mD);
              if (s) { maleSolarMonth = s.month;
                maleSolarDay = s.day; }
            }
            if (femaleCal) {
              var s2 = lunarToSolar(fY, fM, fD);
              if (s2) { femaleSolarMonth = s2.month;
                femaleSolarDay = s2.day; }
            }
            updateExtraPanel(tab, maleName, femaleName, maleSolarMonth, maleSolarDay, femaleSolarMonth, femaleSolarDay);

          } catch (e) {
            console.error('计算错误:', e);
            stepList.innerHTML =

          } finally {
            loadingOverlay.classList.remove('active');
            calcBtn.disabled = false;

        femaleHourInput.value = 14;
        document.querySelector('input[name="maleCal"][value="solar"]').checked = true;
        document.querySelector('input[name="femaleCal"][value="solar"]').checked = true;
        document.querySelector('input[name="gender"][value="male"]').checked = true;
        document.getElementById('maleHourLabel').textContent = getShiChen(8);
        document.getElementById('femaleHourLabel').textContent = getShiChen(14);
        document.querySelectorAll('.input-error').forEach(function(el) { el.textContent = ''; });
        document.querySelectorAll('.error').forEach(function(el) { el.classList.remove('error'); });
        calculate();
      }

      // 绑定事件
      calcBtn.addEventListener('click', calculate);
      resetBtn.addEventListener('click', resetExample);

      document.querySelectorAll('.extra-tabs .btn-extra').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.extra-tabs .btn-extra').forEach(function(b) { b.classList.remove('active'); });
          this.classList.add('active');
          var tab = this.dataset.target;
          var maleSurname = maleSurnameInput.value.trim();
          var maleGivenName = maleGivenNameInput.value.trim();
          var femaleSurname = femaleSurnameInput.value.trim();
          var femaleGivenName = femaleGivenNameInput.value.trim();
          var maleName = (maleSurname || '') + (maleGivenName || '') || '男方';
          var femaleName = (femaleSurname || '') + (femaleGivenName || '') || '女方';
          var mM = parseInt(maleMonthInput.value) || 5;
          var mD = parseInt(maleDayInput.value) || 12;
          var fM = parseInt(femaleMonthInput.value) || 8;
          var fD = parseInt(femaleDayInput.value) || 20;
          var maleCal = document.querySelector('input[name="maleCal"]:checked').value === 'lunar';
          var femaleCal = document.querySelector('input[name="femaleCal"]:checked').value === 'lunar';
          var maleSolarMonth = mM,
            maleSolarDay = mD,
            femaleSolarMonth = fM,
            femaleSolarDay = fD;
          if (maleCal) {
            var s = lunarToSolar(parseInt(maleYearInput.value) || 1990, mM, mD);
            if (s) { maleSolarMonth = s.month;
              maleSolarDay = s.day; }
          }
          if (femaleCal) {
            var s2 = lunarToSolar(parseInt(femaleYearInput.value) || 1992, fM, fD);
            if (s2) { femaleSolarMonth = s2.month;
              femaleSolarDay = s2.day; }
          }
          updateExtraPanel(tab, maleName, femaleName, maleSolarMonth, maleSolarDay, femaleSolarMonth, femaleSolarDay);
        });
      });

      window.addEventListener('load', function() {
        bindHourTranslation();
        calculate();
      });
    })();
  </script>
</body>
</html>
